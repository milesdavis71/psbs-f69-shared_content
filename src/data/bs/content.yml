sections:
  - title: BS HAT25
    tab_images:
      - src: /assets/img/common/palyazatok/megvalosult-m-korm-tamogat.jpg
        alt: Megvalósult Magyarország Kormánya támogatásával
      - src: /assets/img/common/palyazatok/bga-logo.jpg
        alt: Bethlen Gábor Alapkezelő Zrt.
    content:
      - type: maintitle
        text: „Ismerd meg, érezd át, vidd haza!”
      - type: date
        text: 2026. 06. 02 – 2026. 06. 06
      - type: heading
        text: A kezdetek
      - type: paragraph
        text: "Amikor elindult a tanév szinte minden nap szóba került az erdélyi kirándulás: vagy a 8.-osoktól vagy osztályfőnökünktől, Móni nénitől hallottunk arról, hogy milyen szuper élményekben lesz részünk, ha megnyerjük a pályázatot. Nagyon izgatottak voltunk, hiszen a tét öt, szülők nélküli nap volt a távoli Erdélyben. A téli szünet előtti utolsó napon kaptuk a hírt, hogy nyert a pályázatunk, utazhatunk!"
      - type: heading
        text: Az előkészület
      - type: paragraph
        text: "A kirándulás előtt történelem-, földrajz-, magyar- és énekórákon megismerkedtünk Erdély történelmével, földrajzával, ott élő írókról, költőkről szereztünk új ismereteket, és még a székely himnuszt is megtanultuk. Az előkészítő órákon az okostoboz.hu oldalon sok érdekes, játékos feladatot oldottunk meg. Közben rengeteg új dolgot tanultunk Erdélyről. Megismertük, milyen nemzetiségek élnek ott, hallottunk az Erdélyi Fejedelemségről, és azt is megtudtuk, milyen finom ételek tartoznak az erdélyi konyhához. Több erdélyi várossal is megismerkedtünk, így amikor a kiránduláson eljutottunk ezekre a helyekre, sok mindent felismertünk. A játékos feladatoknak köszönhetően könnyebb volt megjegyezni az információkat, és még jobban vártuk az utazást. "
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/bs_busz_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/bs_busz_thumb.jpg
            alt: Kép 1
      - type: heading
        text: "Kirándulásunk első napja: Déva és Gyulafehérvár"
      - type: paragraph
        text: A korai kelés után izgatottan indultunk el a ránk váró, hosszú útra. Körülbelül négyórás buszozást követően végre megérkeztünk az első állomásunkhoz, ahol megpillantottuk Déva várát. Egyből a felvonóhoz siettünk, ám sajnos kiderült, hogy nem működik, így gyalogosan vágtunk neki a hegynek. Séta közben úgy tűnt, sosem érünk fel, és a csúcsra érve láttuk, hogy még további lépcsőfokok is várnak ránk. Bár alaposan elfáradtunk, a fentről elénk táruló csodás panoráma mindenkit kárpótolt. Miután alaposan körbejártuk és megcsodáltuk a várat, elindultunk visszafelé. Lefelé menet egy másik útvonalat választottunk, hogy a vár többi részét is láthassuk. Mire leértünk, alaposan elfáradtunk, de örömmel és kíváncsian folytattuk az utunkat.

      - type: paragraph
        text: Ezután Gyulafehérvár felé vettük az irányt. Ezt a várost már ismertük az Egri csillagokból, és Bea néni is sokat mesélt róla – különösen Hunyadi Jánosról és a fiáról, Lászlóról. Már nagyon vártuk, hogy láthassuk az 1000 éves székesegyházat. Amikor beléptünk, elállt a lélegzetünk. Komolyan, tátott szájjal néztük a hatalmas, gyönyörű templomot. Megkerestük a Hunyadi-sírokat, és elhelyeztük a koszorút – az egyik a törökverő hősé, a másik a tragikus sorsú fiáé, Lászlóé. Ezután tovább indultunk… és csak később jöttünk rá, hogy még milyen hosszú út áll előttünk.

      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/deva_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/deva_thumb.jpg
            caption: Déva
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/deva2_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/deva2_thumb.jpg
            caption: Déva
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/gyfhvar_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/gyfhvar_thumb.jpg
            caption: Gyulafehérvár

      - type: heading
        text: "2. nap: Szekértúra és Korond"
      - type: paragraph
        text: "A második napon a kicsit későbbi ébredés és a bőséges, finom reggeli után izgalmas program várt ránk: szekértúrára indultunk. A szekerek Székelyvarság központjában vettek fel bennünket. Útközben megálltunk a Csorgókő-vízesésnél, amely gyönyörű látványt nyújtott. Az út során a kulacsainkat is feltölthettük hűsítő forrásvízzel. Egy közeli kilátót is útba ejtettünk, ahonnan csodálatos panoráma tárult elénk. A szekereken utazva rengeteget nevettünk és viccelődtünk; mindannyian nagyon jól éreztük magunkat, és egy igazán felejthetetlen élménnyel gazdagodtunk."
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/szekertura_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/szekertura_thumb.jpg
            alt: Kép 1
            caption: Szekértúra
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/kilato_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/kilato_thumb.jpg
            alt: Kép 2
            caption: Kilátó
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/vizeses_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/vizeses_thumb.jpg
            alt: Kép 2
            caption: Csorgókő-vízesés
      - type: paragraph
        text: Ezután egy közel kétórás utazás következett Korondra. Az egyetlen nehézséget a nagy meleg jelentette, de a programok kárpótoltak minket. Elsőként szabadprogramként vásárlásra volt lehetőségünk, ami mindenkinek nagyon tetszett. Egy hosszabb séta után ellátogattunk egy helyi taplászmesterhez. Nagyon érdekes bemutatót tartott nekünk a taplógomba fajtáiról és azok feldolgozási módjáról, emellett pedig a helyi erdők pusztulásának komoly problémájáról is mesélt nekünk. Megmutatták nekünk, hogy hogyan készítenek táskát, kendőt, sapkát és különböző dísztárgyakat taplógombából. A bemutató után kaptunk még egy kis időt ajándéktárgyak vásárlására, majd az aragonitcsiszolást is kipróbálhattuk. Ez különösen izgalmas volt, hiszen ilyesmire nem adódik lehetőség a hétköznapokban. A sűrű program után élményekkel telve indultunk vissza a szállásra, ahol már várt bennünket Zsuzsi néni isteni finom vacsorája.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/taplasz-korond_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/taplasz-korond_thumb.jpg
            alt: Kép 1
            caption: Taplászmester Korondon
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/aragonit-korond_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/aragonit-korond_thumb.jpg
            alt: Kép 2
            caption: Korond
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/2-nap-este_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/2-nap-este_thumb.jpg
            alt: Kép 3
            caption: Esti élmények
      - type: heading
        text: "3. nap: Gyimesbükk"
      - type: paragraph
        text: A harmadik napon nagyon korán indult a reggelünk. A korai reggeli után, pontosan 7 órakor indultunk útnak Gyimesbükkre. Első állomásunk a helyi Dani Gergely Általános Iskola volt, ahol a diákok és a tanárok rendkívül kedvesen fogadtak bennünket. Meghallgattuk a helyi hetedikesek előadását, amelyen keresztül közelebbről is megismerhettük a kultúrájukat és a hagyományaikat, sőt, egy közös táncba is bekapcsolódhattunk. A vendéglátás után még röplabdáztunk is a helyi gyerekekkel. Innen az ezeréves határhoz mentünk, ahol koszorúzással egybekötött ünnepséget tartottunk. Közösen megemlékeztünk a Nemzeti Összetartozás Napjáról, és felelevenítettük a trianoni békeszerződésről tanult történelmi ismereteinket.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/gyimesbukk-1_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/gyimesbukk-1_thumb.jpg
            alt: Kép 1
            caption: Gyimesbükk
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/gyimesbukk-2_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/gyimesbukk-2_thumb.jpg
            alt: Kép 2
            caption: Gyimesbükk
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/gyimesbukk-3_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/gyimesbukk-3_thumb.jpg
            alt: Kép 3
            caption: Gyimesbükk
      - type: paragraph
        text: Programunk egy helyi sajtkészítő műhelyben folytatódott, ahol betekintést nyerhettünk a tradicionális sajtkészítés folyamatába. Rengeteg ínycsiklandó, különleges sajtot láthattunk, amelyeket meg is kóstolhattunk. Ebédünket a skanzenben fogyasztottuk el a gyimesbükki diákok társaságában. Egy rövid beszélgetés és a búcsúzkodás után elindultunk vissza a szállásunkra. Hosszú, de eseménydús és felejthetetlen napot tudhattunk magunk mögött.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/gyimesbukk-4_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/gyimesbukk-4_thumb.jpg
            alt: Kép 1
            caption: Gyimesbükk, sajtműhely
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/gyimesbukk-5_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/gyimesbukk-5_thumb.jpg
            alt: Kép 2
            caption: Gyimesi skanzen
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/3-nap-este_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/3-nap-este_thumb.jpg
            alt: Kép 3
            caption: Esti élmények
      - type: heading
        text: "4. nap: Természeti csodák és kürtőskalács-sütés"
      - type: paragraph
        text: A negyedik napon ismét egy hosszabb utazással indítottunk, elsőként a lenyűgöző Gyilkos-tóhoz érkeztünk meg. Meghallgattuk a tó keletkezésének izgalmas legendáját. Idegenvezetőnk, Robi rengeteg új és érdekes információt osztott meg velünk a környékről. A látogatás végén a tóparti árusoknál ajándéktárgyakat is vásárolhattunk. Ezután busszal indultunk a Békás-szorosba, amelynek hatalmas sziklafalai már a busz ablakából is pazar látványt nyújtottak. Majd gyalog folytattuk utunkat, és egy rövid séta után egy kissé csúszós erdei ösvényen haladtunk tovább, amelynek a végén egy izgalmas függőhíd várt ránk. Átkeltünk a hídon, megcsodáltuk a természet szépségét, és a közös fényképek elkészítése után visszatértünk a buszhoz.
      - type: images
        images_per_row: 2
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/gyilkos-to_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/gyilkos-to_thumb.jpg
            alt: Kép 1
            caption: Gyilkos-tó
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/bekas_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/bekas_thumb.jpg
            alt: Kép 2
            caption: Békás-szoros
      - type: paragraph
        text: "A következő állomásunk felé tartva sem unatkoztunk: a menetidőt Robi tette tartalmassá, aki humoros történetekkel szórakoztatott bennünket, miközben rengeteg hasznos ismerettel gazdagodtunk. A délután hátralévő részében egy igazán különleges programon vettünk részt, ugyanis kürtőskalácsot készítettünk. Mindenki saját maga tekerte fel, és sütötte meg a kalácsot, amiben a rendkívül kedves és segítőkész házigazdák voltak a segítségünkre. Kétféle változatot, kakaósat és fahéjasat is készíthettünk, és mindkettő isteni finom lett. Amíg a csapat egyik fele a parázs felett sütött, a többiek egy gyönyörű, tágas területen kapcsolódhattak ki, ahol röplabdáztunk és jót beszélgettünk."
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/kurtos-kalacs-1_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/kurtos-kalacs-1_thumb.jpg
            alt: Kép 1
            caption: Kürtőskalács-sütés
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/kurtos-kalacs-2_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/kurtos-kalacs-2_thumb.jpg
            alt: Kép 2
            caption: Kürtőskalács-sütés
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/4-nap-este_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/4-nap-este_thumb.jpg
            alt: Kép 3
            caption: Esti élmények
      - type: heading
        text: "5. nap: Történelmi emlékhelyek és hazautazás"
      - type: paragraph
        text: Kirándulásunk utolsó napján is korán keltünk. A reggeli után hálásan megköszöntük a fantasztikus vendéglátást, majd búcsút vettünk Zsuzsi nénitől és családjától. Ezután útnak indultunk hazafelé, de a visszaútra is tartogattunk még izgalmas programokat. Elsőként Fehéregyháza közelében álltunk meg, és megkoszorúztuk a Petőfi-emlékhelyet. Következő úti célunk Segesvár volt, ahol kellemes sétát tettünk a történelmi vár területén, és a híres Diák-lépcsőt is megmásztuk.
      - type: images
        images_per_row: 2
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/petofi_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/petofi_thumb.jpg
            alt: Kép 1
            caption: Petőfi-emlékhely
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/segesvar_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/segesvar_thumb.jpg
            alt: Kép 2
            caption: Segesvár
      - type: paragraph
        text: Erdélyi utazásunk legutolsó helyszíne a nagybaromlaki erődtemplom volt. Itt felmerészkedtünk a templomtoronyba is, ahonnan csodálatos kilátás nyílt a festői környékre.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/nagybaromlak_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/nagybaromlak_thumb.jpg
            alt: Kép 1
            caption: Nagybaromlak
      - type: paragraph
        text: "Innen már megállás nélkül, egyenesen hazafelé tartottunk a busszal. Az út végén vegyes érzések kavarogtak bennünk: egyrészt mindannyian sajnáltuk, hogy véget értek ezek a csodás kalandok, másrészt viszont már nagyon örültünk annak, hogy este végre viszontláthatjuk a családunkat."
      - type: paragraph
        text: Hálás szívvel köszönjük kísérő tanárainknak a rengeteg szervezést, a türelmet és a gondoskodást, amellyel ezt a felejthetetlen utazást lehetővé tették számunkra. Köszönjük, hogy vigyáztak ránk, és hogy velük együtt élhettünk át ennyi csodás élményt Erdélyben!
      - type: heading
        text: Az utazás zárása
      - type: paragraph
        text: Hazaérésünk után az első osztályfőnöki órán szinte egymás szavába vágva idéztük fel az utazás felejthetetlen vagy épp legviccesebb pillanatait az ott készült képek alapján. Egyetértettünk abban, hogy fantasztikus öt napot töltöttünk Erdélyben!
      - type: paragraph
        text: A családi napon Barni, Ricsi és Andor, osztályunk legbátrabb tanulói tartottak előadást, képes élménybeszámolót a kirándulásról.
      - type: paragraph
        text: Hálás szívvel köszönjük Hurton Kati néninek a sikeres pályázatírást, kísérő tanárainknak a rengeteg szervezést, a türelmet és a gondoskodást, amellyel ezt a felejthetetlen utazást lehetővé tették számunkra. Köszönjük, hogy vigyáztak ránk, és hogy velük együtt élhettünk át ennyi csodás élményt Erdélyben!
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_25/full/zarashoz_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_25/thumb/zarashoz_thumb.jpg
            alt: Kép 1
            caption: Élménybeszámoló
  - title: BS HAT24
    tab_images:
      - src: /assets/img/common/palyazatok/megvalosult-m-korm-tamogat.jpg
        alt: Megvalósult Magyarország Kormánya támogatásával
      - src: /assets/img/common/palyazatok/bga-logo.jpg
        alt: Bethlen Gábor Alapkezelő Zrt.
    content:
      - type: maintitle
        text: „Te látó ember leszel, ugye?”
      - type: date
        text: (Wass Albert)
      - type: date
        text: 2025. 04. 30. – 2025. 05. 04.
      - type: paragraph
        text: Azért írtuk ezt a naplót, hogy ne csak mi őrizzük meg a sok szép emléket, hanem megmutathassuk az iskolatársainknak, a családunknak és a barátainknak is, milyen klassz dolgok történtek velünk!
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/01.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/01.jpg
            alt: Kép 1
      - type: paragraph
        text: Tudtuk, hogy sok előkészület vár ránk, de ez senkit nem zavart. Már akkor sejtettük, hogy felejthetetlen élményben lesz részünk. Egy öt napos kirándulás, ráadásul Erdélyben? Hát persze, hogy izgatottan számoltuk vissza a napokat!
      - type: paragraph
        text: Ahogy közeledett a tavasz, egyre komolyabb lett a dolog. Több osztályfőnöki órán is beszéltünk az útról, és előkészítő foglalkozásokat is tartottunk. Történelem, földrajz, és sok érdekes beszélgetés. Bea néni elvarázsolt minket Erdély múltjával, a fejedelmek történeteivel. Földrajz órán megismertük Erdély hegyeit, folyóit, városait. Az igazgatóhelyettes néni is csatlakozott hozzánk – ő már sokszor járt ott, és szuper történeteket mesélt a helyi emberekről meg nevezetességekről. Gyöngyi néni megtanította nekünk a székely himnuszt – eleinte kicsit szomorúnak éreztük, de a végére szépen, szívből tudtuk elénekelni. Még a népi hangszerekről is tanultunk, játékosan, vidáman.
      - type: paragraph
        text: Az előkészítő foglalkozások alkalmáva Határtalanul! Barangoló digitális tartalmak segítségével máris ott éreztük magunkat Erdélyben. Így a felkészítő órák kicsit olyanok voltak, mint egy „próba-kaland” – és ettől a valódi utazásunk még izgalmasabb lett!
      - type: paragraph
        text: "Az utolsó előkészítőóra pár nappal az indulás előtt volt. Itt már tényleg minden a helyére került: megbeszéltük az utolsó részleteket, és a szüleink segítségével összeállítottuk az ajándékcsomagokat a kint élő gyerekeknek. A szülők legalább annyira izgultak, mint mi! Nóri néni még a személyi igazolványainkat is jó előre összegyűjtötte, nehogy valaki otthon felejtse. Biztosra ment – szerencsére!"
      - type: heading
        text: 1. nap – Indulás és az első nagy kalandok
      - type: paragraph
        text: Hajnali ötkor már mindenki a buszmegállóban toporgott, álmos, de izgatott szemekkel. Most senki nem késett el, sőt – mindenki időben ott volt (ez amúgy ritka!). Gyorsan a határhoz értünk, és simán átjutottunk.
      - type: paragraph
        text: Az első megállónk Déva vára volt. Már messziről láttuk a felvonót, és alig vártuk, hogy beszállhassunk. Csakhogy a vár felvonóját javították, így gyalog indultunk meg felfelé. Jól is esett ez a kis séta a hosszú út után. A vár 250 méter magas sziklán áll – ott barangolni nagyon különleges élmény volt, még a meleg ellenére is.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/02.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/02.jpg
            alt: Kép 1
      - type: paragraph
        text: Ezután Gyulafehérvár felé vettük az irányt. Ezt a várost már ismertük az Egri csillagokból, és Bea néni is sokat mesélt róla – különösen Hunyadi Jánosról és a fiáról, Lászlóról. Már nagyon vártuk, hogy láthassuk az 1000 éves székesegyházat. Amikor beléptünk, elállt a lélegzetünk. Komolyan, tátott szájjal néztük a hatalmas, gyönyörű templomot. Megkerestük a Hunyadi-sírokat, és elhelyeztük a koszorút – az egyik a törökverő hősé, a másik a tragikus sorsú fiáé, Lászlóé. Ezután tovább indultunk… és csak később jöttünk rá, hogy még milyen hosszú út áll előttünk.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/bs_busz_full.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/bs_busz_thumb.jpg
        alt: Kép 1
      - type: paragraph
        text: Utunk folytatódik...
      - type: paragraph
        text: Déva és Gyulafehérvár után Nagybaromlak felé vettük az irányt. Itt egy szász erődtemplomot néztünk meg, amit ma is használnak azok a szászok, akik még ott élnek. A legizgalmasabb az volt, amikor a csigalépcsőkön felmászhattunk egészen a harangokig. Elég félelmetes volt – szűk, magas, és recsegett-ropogott minden. Valaki meg is kongatta a harangot, amitől majd’ kiugrott a szívünk – akkora hangja volt!
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/04.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/04.jpg
            alt: Kép 1
      - type: paragraph
        text: Késő délután értünk a szállásra, Székelyvarságba. Már az is kaland volt, mire a busz beállt a parkolóba – nem volt egyszerű manőver. A teraszon ott várt ránk Zsuzsika néni, a Csorgókő Panzió kedves tulajdonosa, és tényleg úgy örült nekünk, mintha régi ismerősök lennénk.
      - type: paragraph
        text: A szállás... hát mit is mondjunk? Inkább emlékeztetett egy kis luxus hotelre! Külön szobák, saját fürdő, és általában ketten laktunk egy szobában. A tanári szoba pont középen volt – gyanús, hogy ez nem véletlen... Nehéz is lett volna titokban mászkálni, mert a faházban minden lépés hallatszott!
      - type: paragraph
        text: A szállásunk környéke olyan volt, mint egy nagy játszótér, amit csak nekünk találtak ki! Biztonságos, barátságos, és tele volt lehetőséggel a mókára. Amint letettük a csomagjainkat, már szaladtunk is focizni, röplabdázni, vagy épp a játszótéren kergettük egymást, mintha soha nem fáradnánk el. Minden este olyan volt, mint egy mini fesztivál – csak mi, a barátaink, meg egy csomó nevetés. Néha még azt is elfelejtettük, hogy este van, annyira nem akartunk bejönni. Komolyan, néha már trükközni kellett, hogy valaki végre hajlandó legyen lezuhanyozni!
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/05.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/05.jpg
            alt: Kép 1
      - type: paragraph
        text: A vacsorára egyszerűen nincsenek szavak. Három fogás, házi alapanyagokból, nagy szeretettel készítve. Olyan ízeket ettünk, amit otthon ritkán. Este 10 körül tanáraink megpróbálták lefektetni az osztályt – de kevés sikerrel. Szerintünk a 90%-unk egy percet sem aludt. Túl izgatottak voltunk!
      - type: heading
        text: 2. nap – barlang, tó, híd és kürtőskalács
      - type: paragraph
        text: Reggel 6:45-kor szólt az ébresztő. Gyors készülődés után, reggelivel a hasunkban újra buszra szálltunk. Előre tudtuk, mi lesz a napi program – tanáraink mindig pontosan elmondták, mire készüljünk és mit pakoljunk a hátizsákba. Azt viszont nem sejtettük, milyen különleges nap vár ránk. A busz hátsó részében olyan jó volt a hangulat, hogy észre sem vettük, amikor Robi, a túravezetőnk, felszállt. Nagyon másképp beszélt, mint mi, de minden szava érdekes volt. Tőle tanultuk a „veddfelke” szót – ez egy meleg pulóvert jelentett, amit a barlangba kellett vinnünk.
      - type: paragraph
        text: Egy rövid, de meredek túra után elértük a Sugó-barlangot. Fejlámpát kaptunk, és be is mentünk. Bent csúszós volt a talaj, néha le kellett hajolni – aki nem figyelt, be is verte a fejét. Robi elmondta, hogy ez a barlang a Gyergyói-medence egyik legfontosabb természeti kincse, főleg a benne élő különleges denevérek miatt. És tényleg jól jött a veddfelke – odabent csak 7–12 fok volt!
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/06.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/06.jpg
            alt: Kép 1
      - type: paragraph
        text: "Ezután buszra szálltunk és meg sem álltunk a Gyilkos-tóig. Itt mindenki kapott egy igazi helyi kürtőskalácsot. Komolyan mondjuk: életünk legfinomabb kalácsa volt! Innen gyalog mentünk tovább a Békás-szorosba. A patakról kapta a nevét, ami végig kísért minket. A sziklafalak hatalmasak, lenyűgöző volt ott sétálni."
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/07.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/07.jpg
            alt: Kép 1
      - type: paragraph
        text: "Robi elvitt minket egy titkos helyre is, amit csak a legjobb gyerekeknek szokott megmutatni: egy függőhídhoz, amit ő „kis Békásnak” hívott. Kettő átkelést tervezett, de medveriasztást kaptunk, így az első híd után visszafordultunk. Ez is nagy élmény volt!"
      - type: paragraph
        text: A Gyilkos-tó keletkezéséről már Bella nénitől, a földrajzórákon is tanultunk, most Robi is elmagyarázta – a földcsuszamlás hogyan torlaszolta el a vizet. Próbáltuk jól megjegyezni, mert a kiálló fatörzsek egyszer majd teljesen eltűnhetnek.
      - type: paragraph
        text: Este visszaértünk Székelyvarságra, ahol Zsuzsika néni újra valami csodát főzött. Közös játék és nevetés zárta a napot – tanáraink este 10-kor alig bírtak lefogni minket. 😊
      - type: heading
        text: 3. nap – az ezer éves határ és az esztena meglepetései
      - type: paragraph
        text: "Ezen a napon is korán keltünk, mert tanáraink előre figyelmeztettek: ma messzire megyünk! A buszból nézve gyönyörű volt a táj – zöld dombok, hegyek, kis házak mindenfelé. Útban az ezer éves határ felé megálltunk egy régi vasúti őrháznál, ami olyan volt, mint egy időutazás. Szerettük volna megnézni a Rákóczi-várat is, de sajnos felújítás alatt volt – úgyhogy azt majd legközelebb!"
      - type: paragraph
        text: "Aztán megérkeztünk a Kontumáci kápolnához, ahol már várt minket Fülöp bácsi, a helyi idegenvezető. Nagyon kedves ember volt, érdekes dolgokat mesélt nekünk a csángókról – kiderült, hogy háromféle csoportjuk van: moldvai, gyimesi és hétfalusi. Ezt jól meg is jegyeztük, mert úgy mesélte el, hogy közben szinte láttuk magunk előtt az egészet."
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/08.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/08.jpg
            alt: Kép 1
      - type: paragraph
        text: "A legnagyobb meglepetés viszont az volt, amikor meghívott minket a saját esztenájába. Fogalmunk sem volt, mi az az esztena, de kiderült, hogy ez egy olyan hely, ahova tavasszal kiköltöznek az állatokkal, és ott maradnak egész nyáron, amíg be nem köszönt a tél. Olyan volt, mint egy nyári tanyavilág – hegyek között, friss levegőn."
      - type: paragraph
        text: Ott megmutatta a sajtkészítés minden lépését, és azt is, hogyan használják az oltógyomrot (ami... hát, nem volt a lányok kedvence, sőt, volt, aki kicsit rosszul is lett tőle 😄).
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/09.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/09.jpg
            alt: Kép 1
      - type: paragraph
        text: "Aztán jött a tábortűz, ami igazi kaland volt! Mindenki maga sütötte meg a szalonnáját, kolbászát, és Fülöp bácsi saját készítésű pityókás kenyeret adott hozzá – mennyei volt. Kóstoltunk háromféle sajtot is, de az osztály nagy része egyetértett: a középső volt a legfinomabb!"
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/10.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/10.jpg
            alt: Kép 1
      - type: paragraph
        text: Ebéd után még kóboroltunk egy kicsit az esztena körül, mászkáltunk a domboldalon, fotóztunk, de aztán Katinka néni finoman jelezte, hogy ideje búcsút venni. Visszautaztunk Székelyvarságra, ahol Zsuzsika néni már újra várt minket a szokásos szeretettel.
      - type: paragraph
        text: "Este még egy meglepetés várt ránk: a helyi iskolások néptánc-bemutatója! A vezetőjük köszöntött minket, megmutatták a szép népi viseletüket, majd táncoltak, énekeltek nekünk – és képzeljétek, mikrofon nélkül! Olyan erősen és szépen énekeltek, hogy mindenkinek libabőrös lett a karja. Mi is bemutatkoztunk, elmondtuk, honnan jöttünk, és elénekeltük velük együtt a Tavaszi szél vizet áraszt című népdalt."
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/11.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/11.jpg
        alt: Kép 1
      - type: paragraph
        text: Valahogy ezen az estén mindenki megváltozott egy kicsit. Nem tudjuk megmagyarázni, de olyan érzésünk volt, mintha ez a közös éneklés és tánc összekötött volna minket. Ettől a perctől kezdve már nem csak osztálytársak voltunk, hanem egy igazi csapat. Barátkoztunk, nevettünk, táncoltunk – és ez volt az egyik legszebb este az egész út alatt.
      - type: heading
        text: 4. nap – sós levegő, zötyögés, vízesés és egy csipetnyi szomorúság
      - type: paragraph
        text: Reggel ismét korán kelés – már egész jól ment –, gyors reggeli, aztán szendvicsgyártás. Készülődtünk, mert sűrű nap várt ránk. Első állomásunk Szejkefürdő volt, ahol egy különleges székelykapus sétány vezetett fel Orbán Balázs sírjához. Ő egy híres székely író és utazó volt, aki sokat tett azért, hogy megismerjük Erdélyt. Koszorút is elhelyeztünk, ahogy ilyenkor illik.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/12.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/12.jpg
        alt: Kép 1
      - type: paragraph
        text: "Ezután irány Parajd, ahol a sóbánya várt ránk! Már maga a lejutás is izgalmas volt, de odalent mindenkit elvarázsolt a hatalmas tér és a sós levegő. Nemcsak nézelődni lehetett, hanem hintázni, röpizni, tollasozni, és sokan minden játékot kipróbáltak. Egy apró bonyodalom is akadt: egy labdánk berepült egy fa bódéba, és a pultos néni nem akarta visszaadni. Katinka néni nyugodtan megoldotta a helyzetet, de csak úgy kaptuk vissza, hogy ígéretet tett, elzárja tőlünk. Hát, végül is, úgyis indulnunk kellett tovább…"
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/13.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/13.jpg
        alt: Kép 1
      - type: paragraph
        text: "A következő programunk igazi falusi kaland volt: szekereken vágtunk neki az erdőnek! Zötyögött, rázkódott, porzott az út – de mi csak nevettünk és beszélgettünk közben. A Csorgókő-vízesésnél megálltunk, ahol azok, akiknek vízálló cipőjük volt, simán belegázoltak a patakba. Akinek nem volt… hát, azok is vizesek lettek. 😄"
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/14.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/14.jpg
        alt: Kép 1
      - type: paragraph
        text: "Ezután felmásztunk egy többemeletes kilátóba, ahol körbe tudtunk nézni – 360 fokban! Az egész környéket beláttuk: fák, hegyek, házak – gyönyörű volt. Ott álltunk fent, és kicsit csendben maradtunk. Még mi is."
      - type: paragraph
        text: "Este aztán eljött, amit egyikünk sem várt: az utolsó vacsora. Zsuzsika néni még erre is meglepetéssel készült: töltött káposzta, almáspite – és persze az elmaradhatatlan házi leves. A finom falatok mellett köszönetet mondtunk neki és a családjának. Meg is hatódtunk kicsit – többen nagyon csendesek voltunk. Valahogy senki nem akart hazamenni. Aznap este kicsit szomorkás hangulatban pakoltunk be a bőröndjeinkbe."
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/15.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/15.jpg
            alt: Kép 1
      - type: heading
        text: 5. nap – Petőfi nyomában és búcsú Erdélytől
      - type: paragraph
        text: Utolsó reggel, utolsó pakolás, utolsó reggeli. Mindenki csendesebb volt a szokásosnál. A buszba már rutinosan ültünk be – indulás Fehéregyházára. Ott egy kis múzeumban Petőfi Sándorra emlékeztünk. A gondnok bácsi elmesélte, hogy három tömegsír is van a környéken, amelyek közül az egyikben akár Petőfi is nyugodhat. Nem biztos, hogy ő az, de attól még koszorút helyeztünk el az emlékezés szobránál, ahogy a nagy költő megérdemli.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/16.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/16.jpg
            alt: Kép 1
      - type: paragraph
        text: Ezután elmentünk Segesvárra, ami egy igazi mesebeli város. Megnéztük az óratornyot, aminek az egyik számlapja a vár, a másik a város felé néz – hogy mindenki tudja, hány óra van. Láttuk Drakula szülőházát is – most étterem működik benne. A diákok lépcsőjét is megmásztuk (hivatalosan 175 lépcső van, de mindenki mást számolt – fáradtan nem volt könnyű pontosnak lenni).
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/17.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/17.jpg
      - type: paragraph
        alt: Kép 1
      - type: paragraph
        text: Megkezdődött a hazautunk – kb. 6 óra buszozás várt ránk. Nagylaknál egy hatalmas kamionsor állt a határon, már azt hittük, sose jutunk át. De a sofőrünk profin tudta, hova kell sorolni, így gyorsan átvitt minket a határon. Este 8-kor visszaértünk Szegedre, ahol a szülők már alig várták, hogy újra lássanak minket.
      - type: paragraph
        text: Elfáradtunk. De annyi mindent láttunk, tanultunk és átéltünk, hogy örökre megmarad bennünk.
      - type: heading
        text: Értékelő óra – újra együtt, kicsit másképp
      - type: paragraph
        text: Miután hazaértünk, és mindenki kialudta magát (vagy legalábbis megpróbálta), tartottunk egy külön órát, ahol csak mi voltunk jelen – meg persze a felkészítő tanáraink, akik nélkül ez az egész nem jöhetett volna létre.
      - type: paragraph
        text: "Leültünk körben, és mindenki elmondhatta, mi volt számára a legjobb élmény, mit tanult, mi volt vicces, és mi volt nehéz. Jókat nevettünk, mert ahogy felidéztük a pillanatokat, újra ott éreztük magunkat Erdélyben. Közösen válogattunk képeket, amiket feltettünk az iskola Facebook-oldalára, és videókat is megnéztünk a digitális táblán. Néha felkiáltottunk: „Nézd, ott vagyok én is!” – vagy: „Jaj, ez volt az, amikor a medveriasztás után visszafordultunk!”"
      - type: paragraph
        text: Sok emlék, sok nevetés, és egy kis hiányérzet, hogy véget ért.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_24/full/18.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_24/thumb/18.jpg
            alt: Kép 1
      - type: paragraph
        text: Röviden összefoglalva, ezek a csodás dolgok történtek velünk az erdélyi utunk során. Hálásan köszönjük az Emberi Erőforrás Minisztériumának a pályázati támogatást, minden kedves embernek, aki segített nekünk közben – akár egy mosollyal, akár egy tál meleg étellel.

  - title: BS HAT23
    tab_images:
      - src: /assets/img/common/palyazatok/megvalosult-m-korm-tamogat.jpg
        alt: Megvalósult Magyarország Kormánya támogatásával
      - src: /assets/img/common/palyazatok/bga-logo.jpg
        alt: Bethlen Gábor Alapkezelő Zrt.
    content:
      - type: maintitle
        text: Királyok, fejedelmek az 1000 éves határig
      - type: date
        text: 2024. június 11–15.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/01.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/01.jpg
            alt: 01
      - type: paragraph
        text: 6. osztályos korunkban, valamikor május-júniusban Ági néni/ ofőnk/ úgy jött be hozzánk, hogy iskolánk pályázatot nyújt be a Határtalanul programra, ha sikerül, öt egész napot fogunk együtt eltölteni Erdélyben. Nagy volt az öröm és a várakozás. Szülői értekezleten megbeszélték a szülők, hogy mindenki benne van a dologban. Vártunk-vártunk és egyszer valamikor szeptemberben jött az osztály facebookján a hír! Megyünk, mert nyertünk!
      - type: paragraph
        text: Tudtuk, hogy sokat kell majd dolgozni vele, de már akkor éreztük, hogy biztos valami nagyon különleges élményben lesz részünk. 5 napos kirándulás! Már ekkor vártuk!
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/02.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/02.jpg
            alt: 02
      - type: paragraph
        text: "A tanév során több osztályfőnöki órán beszélgettünk erről, de valamikor tavasszal lett komoly a dolog. Előkészítőórákat tartottunk: volt történelem, földrajz és általános felkészítés. Bea néni nagyon sokat mesélt Erdély történelméről, a fejedelemségről. Földrajz órákon pedig Erdély természetföldrajzával ismerkedtünk. Igazgatóhelyettes néni rengeteget járt Erdélyben, ezért ő az ott látható nevezetességekről, emberekről mesélt nekünk."
      - type: paragraph
        text: Gyöngyi néni a székely himnuszt tanította nekünk, ami akkor túl szomorúnak tűnt nekünk. Mivel nagyon szeretünk dalolni, ezért ezt a dalt is szépen tudtuk megszólaltatni. A népi hangszerekről is tanultunk játékos, interaktív formában.
      - type: paragraph
        text: Az utolsó előkészítőóra néhány nappal az indulásunk előtt volt, itt még pontosítottunk 1-2 dolgot, összeraktuk az ajándékokat szüleink segítségével, akik legalább olyan izgatottak voltak az út miatt, mint mi. Ági néni előre gondolkozott és összeszedte a személyi igazolványunkat, nehogy a határon derüljön ki, hogy valakinek a nagy izgalomban otthon maradt. Biztosra ment.
      # első nap
      - type: heading
        text: "1. nap: indulás"
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/03.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/03.jpg
            alt: 03
      - type: paragraph
        text: Hajnalban a rigókkal keltünk és 4-kor már mindenki a buszmegállóban toporgott, hatalmas szemekkel. Érdekes, most senki nem aludt el, mint iskolaidőben az elsőórákról.
      - type: paragraph
        text: Gyorsan a határhoz értünk, ahol minden fennakadás nélkül átjutottunk. Első megállónk Déva vára volt. Látva a felvonót, minél előbb szerettünk volna beszállni. Azonban türelmesnek kellett lennünk, mert a 10 órás nyitásig várnunk kellett fél órát. De ami késik, nem múlik! Eljött a mi időnk, és már szállhattunk is be a kabinba. Nagyon meleg idő volt, tűzött a nap. A 250 magas sziklán büszkén jártuk be a várat.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/04.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/04.jpg
            alt: 04
      - type: paragraph
        text: Utunkat folytattuk Gyulafehérvárra. Ezt a várost az Egri csillagokból már ismertük, meg töri órán Bea néni is rengeteget mesélt a Hunyadi sírról, meg az erdélyi fejedelmekről. Már nagyon vártuk az 1000 éves templomot. Mikor bementünk, tátva maradt a szánk. Csodálatos volt. Megkerestük a Hunyadi sírokat és megkoszorúztuk a törökverő és fia, a kivégzett László sírját, és folytattuk utunkat, amiről akkor még nem is tudtuk, milyen messze van.
      - type: images
        images_per_row: 1
        images:
          - full: 05.jpg
            thumb:
            alt: 05
      - type: paragraph
        text: "Fáradtan értünk a szállásra, Székelyvarságba. Kész kaland volt, mire a busz beállt a parkolóba. Zsuzsika néni, a Csorgókő Panzió tulajdonosa a teraszon várt minket, láthatóan örült az érkezésünknek. A szállás egy luxus szállodának is beillene: minden szobához külön fürdőszoba tartozott, és általában ketten voltunk egy szobában. Az egyik tanári szoba a folyosó közepén volt, gondolom azért, hogy ne tudjunk észrevétlenül átosonni a lányokhoz. Mondjuk nehéz is lett volna, a faházban minden lépést lehetett hallani."
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/06.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/06.jpg
            alt: 06
      - type: paragraph
        text: A vacsora nagyon ízlett mindenkinek. Nagy-nagy szeretettel tálalták fel nekünk mind a három a fogást. Bármit ettünk, az házi volt, mindent maguk a háziak készítettek el. 10 órakor próbálkoztak a tanáraink az altatóval, de nem sok eredménnyel. Az osztály 90 %-a szerintem semmit nem aludt.
        # 2. nap
      - type: heading
        text: 2. nap
      - type: paragraph
        text: Reggel 6:45 volt az ébresztő, készülődés, reggeli után ismét buszra szálltunk. Tudtuk, hogy mire számíthatunk aznap, mert tanáraink mindig részletesen elmondták a programot, és azt is, mi kerüljön bele a hátizsákba. Ekkor még nem is sejtettük, hogy milyen izgalmakban lesz részünk. Olyan jól éreztük magunkat a busz hátuljában, hogy észre sem vettük, mikor szállt fel hozzánk Robi, a túravezetőnk. Nagyon érdekesen beszélt. Értettük minden szavát, de mégis másként fejezte ki magát, mint mi. Tőle tanultuk a veddfelke kifejezést, amit a hátizsákunkba tettünk arra az időre, ha a barlangban fáznánk. Egy rövid, de nehéz túra után jutottunk el a Sugó-barlanghoz, ahova fejlámpával be is mentünk.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/07.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/07.jpg
            alt: 07
      - type: paragraph
        text: Kicsit csúszós volt bent az út, és néhol nagyon le kellett hajolni. Aki nem tette meg, vagy nem figyelt, az bizony beverte a kobakját. Robitól tudom, hogy ez a barlang a Gyergyói medence legjelentősebb helye, a különleges denevéreivel együtt. Igaza volt a túravezetőnek, mert a 7-12 fokos helyen szükségünk volt a veddfelkére.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/08.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/08.jpg
            alt: 08
      - type: paragraph
        text: Ezután buszon jutottunk el a Gyilkos-tóig, ahol mindenekelőtt egy helyi kürtőskalácsot kapott mindenki, ami életem legfinomabb kürtőskalácsa volt. A Békás-szorost gyalog jártuk be, ami a nevét a mellette húzódó Békás patakról kapta, amely egyben a kialakítója is volt.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/09.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/09.jpg
            alt: 09
      - type: paragraph
        text: Robi mutatott nekünk egy különleges helyet, a kis Békást. Azt mondta, ezt a helyet csak a legjobb gyerekeknek mutatja meg, mert egy igazi függőhídon keltünk át. Kettőt tervezett, de kaptunk egy medve riasztást, ezért az első híd átkelése után visszafordultunk.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/10.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/10.jpg
            alt: 10
      - type: paragraph
        text: A Gyilkos-tóról már tanultunk Laci bácsitól, itt Robi is megmutatta, hogy hogyan keletkezett földcsuszamlással. Próbáltuk jól az emlékezetünkbe vésni ezt a különleges látványt, mert a kiálló fatörzsek sajnos nem maradnak meg mindig.
      - type: paragraph
        text: Estére a szállásra érve Zsuzsika néni ismét finomat főzött nekünk, mind a tíz ujjunkat megnyaltuk vacsora után. Ez egy igazi családi vállalkozás, mindenki azért dolgozik, hogy mi vendégek jól érezzük magunkat. Ez meg is történt, mert a közös játéknak tanáraink 10 órakor is alig tudtak véget vetni.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/11.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/11.jpg
            alt: 11
      - type: heading
        # 3. nap
        text: 3. nap
      - type: paragraph
        text: Korán keltünk, mert tanáraink azt mondták, ma messzire látogatunk. Izgatottan vártuk ezt a napot, mert a kis ajándékokat adjuk át a Dani Gergely Általános Iskola szintén hetedikes tanulóinak.
      - type: paragraph
        text: Az oda vezető út gyönyörű volt és hosszú. Alig vártuk a találkozást a diákokkal. Amint megérkeztünk az iskola elé, feltűnt, hogy vmilyen népviseletben jönnek ki a tanulók az iskolából. Katinka néni elmondta, hogy most ért véget a ballagás, itt ez az ünneplő ruha. Nagyon furcsa volt nekünk. A tornateremben történt meg a nagy találkozás. Igazából ugyanolyan gyerekek, mint mi. Az igazgatónő kedvesen köszöntött minket, majd egyikünk bemutatta az iskolánkat, ahonnan jöttünk. Ezután táncoltak, zenéltek nekünk. Nagyon érdekes volt, mert nekik nem kellett mikrofon, hogy halljuk, olyan hangosan tudtak énekelni. Közös éneklésbe is kezdtünk, először a Tavaszi szél kezdetű népdalt daloltuk együtt.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/12.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/12.jpg
            alt: 12
      - type: paragraph
        text: Az igazgatónő kérésére, hogy énekeljünk még egyet, egyikünk azt mondta, hogy a székely himnuszt is énekeljük el. Ilyen szépen, még sohasem szólt. Valami volt a levegőben, mert mindannyian éreztük, hogy most történik valami, bennünk. Innen kezdve felszabadultan kerestük egymás társaságát, táncoltunk, beszélgettünk egymással. Amíg nem esett az eső, az udvaron fociztunk is.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/13.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/13.jpg
            alt: 13
      - type: paragraph
        text: Nehéz volt otthagyni őket, de megfogadtuk, hogy Instán és Fb-on tartani fogjuk a kapcsolatot. Így is lett, sokan levelezünk velük a mai napig.
      - type: paragraph
        text: "Innen az ezeréves határhoz vitt utunk. Kicsit borús idő kísért minket. Az itt álló vasúti őrházat is megnéztük, még szerettük volna a Rákóczi várat is látni, de még felújítás miatt zárva volt. A Kontumáci kápolnánál gyülekeztünk, ahol a helyi idegenvezető, Fülöp megtanította nekünk, hogy kik azok a csángók, és hogy háromféle csoportja létezik: a moldvai, a gyimesi és a hétfalusi. Nagyon kedves ember, mert meghívott minket a saját esztennájába, amiről addig nem is tudtuk, mi az."
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/14.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/14.jpg
            alt: 14
      - type: paragraph
        text: Ez az a hely, ahova kiköltöznek az állatokkal tavasszal és a tél beálltáig itt is maradnak. A sajtkészítés folyamatát is bemutatta nekünk, bár a lányok az oltógyomornál rosszul is lettek.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/15.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/15.jpg
            alt: 15
      - type: paragraph
        text: Tábortüzet is rakott nekünk, ahol mindenki magának sütögethette a szalonnáját, kolbászát. Igazi házi pityókás kenyeret adott hozzá Fülöp, ami nagyon ízletes volt.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/16.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/16.jpg
            alt: 16
      - type: paragraph
        text: Háromféle sajtot kóstolhattunk, mindenkinek a középső volt a legfinomabb, annak legalább volt íze.
      - type: paragraph
        text: Az esztena körül kicsit kóboroltunk a domboldalon, majd az ofő unszolására búcsút intettünk ennek a szép helynek, utaztunk vissza a bázisunkra, Zsuzsika nénihez, aki finom vacsorával várt bennünket. Most a kis unokája is segített a tálalásban, pedig csak öt éves, nagyon aranyos volt.
      - tpye: paragraph
        text: A szállásunk mellett volt egy kis kutya, akivel lehetett játszani is, jól tűrte a közeledésünket.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/17.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/17.jpg
            alt: 17
      - type: heading
        #  4. nap
        text: 4. nap
      - type: paragraph
        text: Reggel korán keltünk, majd megreggeliztünk és szendvicseket készítettünk az útra. Ezt követően indultunk Szejkefürdőre, ahol egy székely kapukkal átívelt úton keresztül mentünk fel Orbán Balázs sírjához, amit szintén megkoszorúztunk.
      - type: paragraph
        text: Esős időben érkeztünk Korondra Zoli bácsihoz és Erzsike nénihez. Zoli bácsi tapló gombából készít különböző tárgyakat. El is mesélte nekünk, milyen nagy szaktudás kell ahhoz, hogy ezt a gombát megtalálja, és meg is tudja munkálni. Legtöbben egy kis egeret vásároltunk, amit hűtőmágnesnek hoztuk haza, na meg a lányokat ijesztgetni vele.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/18.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/18.jpg
            alt: 18
      - type: paragraph
        text: Ezt követően tértünk vissza Székelyudvarhelyre, ahol az Emlékezés Parkját kerestük fel. Koszorúzásra, megemlékezésekre került sor.
      - type: paragraph
        text: Sajnos a parajdi sóbánya zárva volt biztonsági okokból, ezért Katinka néni egy másik programot szervezett nekünk. A szállásunkról szekereken indultunk neki az erdőnek, jó zötyögős úton. Minket azonban ez sem zavart, mert útközben jókat beszélgettünk egymással.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/19.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/19.jpg
            alt: 19
      - type: paragraph
        text: A táj ismét gyönyörű volt, megálltunk a Csorgókő vízesésnél, akinek vízálló cipője volt, a patakban gázolhatott is. Persze az is vizes lett, akinek nem volt ilyen cipője. Ezután egy több emeletes kilátóból néztünk a 360 fokos panorámát. A lovakhoz tartozott két csikó is, akik szabadon követtek minket. Ha elkóboroltak, a terelő kutya azonnal ugatásával visszavezette őket a szekerek mellé. Nagyon vicces volt látni, milyen komolyan veszi a kutya a feladatát, és valóban az is volt.
      - type: images
        images_per_row: 2
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/20.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/20.jpg
            alt: 20
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/21.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/21.jpg
            alt: 21
      - type: paragraph
        text: Eljött az utolsó éjszaka, az utolsó finom, házi vacsora. Töltött káposzta és almáspite volt a meglepetés fogás a leves után. Mondanom sem kell, hogy ilyen finomat még nem ettem életemben. Megköszöntük Zsuzsa néniéknek a vendégszeretetét, és hogy mindig finom vacsorával várt minket. Mindenki elérzékenyült.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/22.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/22.jpg
            alt: 22
      - type: paragraph
        text: Szomorúan pakoltunk össze a bőröndükbe estére, senki sem akart hazamenni, szívesen maradtunk volna még itt.
      - type: heading
        # 5. nap
        text: 5. nap
      - type: paragraph
        text: Korán keltünk, bepakoltunk a buszba és elmentünk reggelizni, mert utána Fehéregyházáig meg sem álltunk. Itt a múzeum gondnoka elmondta, hogy három tömegsír van, ahol Petőfi maradványa lehet. Szerinte nem ebben a tömegsírban nyugszik a nagy költő, de az emlékezés szobránál elhelyeztük koszorúnkat és tovább indultunk Segesvár felé.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/23.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/23.jpg
            alt: 23
      - type: paragraph
        text: Itt az óratotnyot néztük meg, melynek két számlapja közül az egyik a város felé, a másik a vár felé néz. Itt láttuk Drakula szülőházát, ami most étteremként működik. Megmásztuk a diákok lépcsőjét, de mindenki más fokot számolt a hivatalos 175 lépcső helyett. Visszatérve az egyetemi épülettől fagyiztunk egyet és folytattuk utunkat Nagybaromlak felé.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/24.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/24.jpg
            alt: 24
      - type: paragraph
        text: Ez egy erődtemplom, amit a szászok használnak, akik még itt maradtak. Felmászhattunk a harangok közé elég félelmetes csigalépcsőn keresztül. Valamelyikünk megszólaltatta a harangot, nagyon hangos volt.
      - type: paragraph
        text: Ezután megkezdtük 6 órás utunkat hazafelé Szegedre. Nagylaknál olyan hosszú kamionsor volt, hogy megijedtünk, soha nem jutunk át. Szerencsére a sofőrünk tudta melyik sorba kell állni és gyorsan átértünk a határon. 8-ra értünk haza, már a szülők ott tolongtak az iskola előtt. Elfáradtunk, de megérte, hiszen sok szép tájat láttunk.
      - type: heading
        text: Értékelő óra
      - type: paragraph
        text: Itt magunk között voltunk, illetve meghívtuk a felkészítő tanárainkat is. Itt mindenki értékelte a kirándulást, elmondta a jó és rossz élményeket, tapasztalatokat. Közös munkával fotókat válogattunk az iskolai facebookra és digitális tábla segítségével megnéztük a képeket és az elkészült videókat. Jókat nevettünk, mert eszünkbe jutottak a szép emlékek és a sok gondtalan perc.
      - type: heading
        text: Témanap
      - type: paragraph
        text: Úgy gondoltuk, hogy ezt a rengeteg dolgot amit láttunk és történt velünk, azt mindenképpen érdemes megosztani a társainkkal, ezért szerveztünk egy kis bemutatót. Itt előadtuk a dalokat amiket tanultunk, megkínáltuk őket az Erdélyből hozott lekváros kenyérrel és rengeteg élményt osztottunk meg velük.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/25.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/25.jpg
            alt: 25
      - type: paragraph
        text: Röviden összefoglalva kedves naplónk, ezek történtek. Köszönjük az Emberi Erőforrás Minisztériumának a pályázati támogatást, a sok kedves embernek, akik segítettek minket az utunk során, és persze ofőnek azt, hogy el mert minket vinni és végig kitartott mellettünk.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_23/full/26.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_23/thumb/26.jpg
            alt: 26

  - title: PS|BS HAT22
    tab_images:
      - src: /assets/img/common/palyazatok/megvalosult-m-korm-tamogat.jpg
        alt: Megvalósult Magyarország Kormánya támogatásával
      - src: /assets/img/common/palyazatok/bga-logo.jpg
        alt: Bethlen Gábor Alapkezelő Zrt.
    content:
      - type: maintitle
        text: Királyok, fejedelmek az 1000 éves határ mentén
      - type: date
        text: 2023. május 17–21.
      - type: paragraph
        text: Iskolánk hetedik osztályos tanulóival a Határtalanul! pályázat keretében 2023. május 17- 21. között Erdélybe utazhattunk, ahol az ott eltöltött öt nap során rendkívül sok érdekes és izgalmas program várt bennünket.
      - type: heading
        text: Első nap
      - type: paragraph
        text: Az indulás napján nagyon korán kellett kelnünk, hiszen hosszú út állt előttünk. Hajnali négy órakor álmosan gyülekeztünk az iskola előtt a buszra várva. Kezdeti fáradtságunk hamar elszállt, hiszen a székelyvarsági szállásra vezető utunkat többször is megszakítottuk egy-egy izgalmas helyszínen.
      - type: paragraph
        text: Déva váránál álltunk meg először. Az időjárás kegyes volt hozzánk, érkezésünkkor már elállt az eső, így nem volt akadálya annak, hogy gyalog tegyük meg a várhoz vezető hosszú utat. Megérte az erőfeszítést, mivel innen gyönyörű kilátás nyílt a környező hegyekre.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/1_1_deva.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/1_1_deva.jpg
            alt: 01
            caption: Déva
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/1_2_deva.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/1_2_deva.jpg
            alt: 02
            caption: Déva
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/1_3_deva.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/1_3_deva.jpg
            alt: 03
            caption: Déva
      - type: paragraph
        text: Folytattuk utunkat Gyulafehérvárra, ahol megtekintettük a székesegyházat, majd a Károly-kapun átsétálva megcsodáltuk a gyönyörű tájat.
      - type: paragraph
        text: Fehéregyházán felkerestük a Petőfi Múzeumot, ahol egy lebilincselő előadás meghallgatása után egy koszorú elhelyezésével emlékeztünk meg Petőfi Sándorról és elénekeltük a Székely himnuszt.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/1_4_a_Gyulafehérvár.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/1_4_a_Gyulafehérvár.jpg
            alt: 01
            caption: Gyulafehérvár
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/1_4_b_Gyulafehérvár.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/1_4_b_Gyulafehérvár.jpg
            alt: 01
            caption: Gyulafehérvár
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/1_5_Fehéregyháza.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/1_5_Fehéregyháza.jpg
            alt: 01
            caption: Fehéregyháza
      - type: paragraph
        text: Innen utunk a szállásunkra vezetett, a székelyvarsági Csorgókő Panzióba. Itt igen kedves fogadtatásban volt részünk. Az egész napos fárasztó túrázás után nagyon jól esett a finom, meleg vacsora.
      # 03
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/1_6_Fehéregyháza.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/1_6_Fehéregyháza.jpg
            alt: 01
            caption: Fehéregyháza
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/1_7_székelyvarság.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/1_7_székelyvarság.jpg
            alt: 02
            caption: Fehéregyháza
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/1_8_székelyvarság.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/1_8_székelyvarság.jpg
            alt: 03
            caption: Székelyvarság
      - type: heading
        text: Második nap
      - type: paragraph
        text: Kirándulásunk második napjának reggelén ellátogattunk a székelyudvarhelyi Emlékezet parkjába, ahol 13 magyar király, író és egyéb híres ember szobránál tettük tiszteletünket. Ezután Szejkefürdőn jártunk, megtekintettük a Székelykapu Múzeumot és Orbán Balázs sírhelyét. Innen Korondra utaztunk és a verőfényes napsütésben helyi kézművesek termékeiből vásárolgattunk.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/2_1_Székelyudvarhely.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/2_1_Székelyudvarhely.jpg
            alt: 01
            caption: Székelyudvarhely
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/2_2_Székelyudrarhely-emlékpark.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/2_2_Székelyudrarhely-emlékpark.jpg
            alt: 02
            caption: Szejkefürdő
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/2_3_Szejkekapu.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/2_3_Szejkekapu.jpg
            alt: 03
            caption: Szejkefürdő
      - type: paragraph
        text: Ebéd után a parajdi sóbányában kapcsolódhattunk ki. Az egészségünknek kedvező környezetben néhány órát pihenéssel töltöttünk el.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/2_4_Korond-sóbánya.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/2_4_Korond-sóbánya.jpg
            alt: 01
            caption: Parajdi sóbánya
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/2_5_Korond-sóbánya.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/2_5_Korond-sóbánya.jpg
            alt: 02
            caption: Parajdi sóbánya
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/2_6_Korond-sóbánya.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/2_6_Korond-sóbánya.jpg
            alt: 03
            caption: Parajdi sóbánya
      - type: paragraph
        text: Délután visszautaztunk Korondra, ahol egy egészen különös szakma művelőivel, taplász-mesterekkel ismerkedtünk meg. Megmutatták nekünk, hogy hogyan készítenek táskát, kendőt, sapkát és különböző dísztárgyakat taplógombából.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/2_7_Korond-sóbánya.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/2_7_Korond-sóbánya.jpg
            alt: 01
            caption: Parajdi sóbánya
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/2_8_Korond-taplász-mesterek.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/2_8_Korond-taplász-mesterek.jpg
            alt: 02
            caption: Korond
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/2_9_Korond-taplász-mesterek.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/2_9_Korond-taplász-mesterek.jpg
            alt: 03
            caption: Korond
      - type: heading
        text: Harmadik nap
      - type: paragraph
        text: Kirándulásunk harmadik napján első utunk a csíkszeredai Nagy István Művészeti Középiskolába vezetett, ahol a helyi hetedik osztályosok és osztályfőnökük vendégszeretetét élvezhettük. Szívélyes fogadtatásban részesültünk az iskola pedagógusaitól. Készült egy közös freskó is, amelyet a csíkszeredai gyerekekkel együtt festettünk.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/3_1_csíkszeredai-Nagy-István-Művészeti-Középiskola.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/3_1_csíkszeredai-Nagy-István-Művészeti-Középiskola.jpg
            alt: 01
            caption: Csíkszereda
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/3_2_csíkszeredai-Nagy-István-Művészeti-Középiskola.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/3_2_csíkszeredai-Nagy-István-Művészeti-Középiskola.jpg
            alt: 02
            caption: Csíkszereda
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/3_3_csíkszeredai-Nagy-István-Művészeti-Középiskola.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/3_3_csíkszeredai-Nagy-István-Művészeti-Középiskola.jpg
            alt: 03
            caption: Csíkszereda
      - type: paragraph
        text: Délután egy újabb csodaszép táj megtekintésére volt lehetőségünk. Gyimesbükkbe látogattunk el. Lovas szekerekkel mentünk fel a hegyek közé, ahol egy esztenánál szalonnát és kolbászt sütöttünk, valamint házi készítésű sajtot kóstoltunk.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/3_4_Gyimesbükk.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/3_4_Gyimesbükk.jpg
            alt: 01
            caption: Gyimesbükk
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/3_5_Gyimesbükk.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/3_5_Gyimesbükk.jpg
            alt: 02
            caption: Gyimesbükk
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/3_6_Gyimesbükk.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/3_6_Gyimesbükk.jpg
            alt: 03
            caption: Gyimesbükk
      - type: paragraph
        text: Egy helyi idegenvezető megismertette velünk a gyimesi csángók történetét. Hazafelé menet útba ejtettük az ezeréves határt is.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/3_7_Gyimesbükk.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/3_7_Gyimesbükk.jpg
            alt: 01
            caption: Gyimesbükk
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/3_8_Gyimesbükk.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/3_8_Gyimesbükk.jpg
            alt: 02
            caption: Gyimesbükk
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/3_9_Ezeréves_határ.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/3_9_Ezeréves_határ.jpg
            alt: 03
            caption: Ezeréves határ
      - type: heading
        text: Negyedik nap
      - type: paragraph
        text: Erdélyi tartózkodásunk negyedik napján korán reggel a Súgó - barlang felé vettük az irányt. Miután megküzdöttünk a meredek hegyoldallal, a barlangban cseppkövek csodálatos látványa fogadott bennünket. A barlang mélyén lekapcsoltuk a zseblámpákat, hogy kipróbáljuk, milyen érzés teljes csendben és vaksötétben lenni.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/4_1_a_Súgó-barlang.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/4_1_a_Súgó-barlang.jpg
            alt: 01
            caption: Súgó-barlang
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/4_1_b_Súgó-barlang.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/4_1_b_Súgó-barlang.jpg
            alt: 01
            caption: Súgó-barlang
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/4_3_Lázár-kastély.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/4_3_Lázár-kastély.jpg
            alt: 03
            caption: Lázár-kastély
      - type: paragraph
        text: A Súgó-barlangból egy újabb csodálatosan szép természeti jelenséghez, a Gyilkos-tóhoz indultunk. Útközben megálltunk megnézni a Lázár-kastélyt. A Gyilkos-tónál finom kürtős kalácsot ettünk, hogy legyen energiánk a hosszú sétához a Békás-szorosban. Lélegzetelállítóan gyönyörű látványt nyújt a Békás-patak és az azt körülölelő hatalmas sziklafalak. Igazi természeti ritkaság, amit itt láthattunk.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/4_2_Gyilkos-tó.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/4_2_Gyilkos-tó.jpg
            alt: 01
            caption: Gyilkos-tó
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/4_4_Békás-szoros.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/4_4_Békás-szoros.jpg
            alt: 02
            caption: Békás-szoros
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/4_6_Békás-szoros.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/4_6_Békás-szoros.jpg
            alt: 03
            caption: Békás-szoros
      - type: heading
        text: Ötödik nap
      - type: paragraph
        text: Az ötödik nap ismét az utazásról szólt. Szívünkben vegyes érzésekkel indultunk haza. Egyrészt sajnáltuk, hogy vége lesz a csodás kalandoknak, másrészt örültünk, hogy este végre viszontláthatjuk a családunkat. Útközben megálltunk Segesváron, itt megmásztuk a Diáklépcsőt és megnéztük Petőfi szobrát.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/5_1_Segesvár.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/5_1_Segesvár.jpg
            alt: 01
            caption: Segesvár
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/5_2_Segesvár.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/5_2_Segesvár.jpg
            alt: 02
            caption: Segesvár
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/5_3_Segesvár.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/5_3_Segesvár.jpg
            alt: 03
            caption: Segesvár
      - type: paragraph
        text: Kirándulásunk utolsó helyszíne a nagybaromlaki erődtemplom volt. Felmentünk a templomtoronyba, ahonnan csodálatos kilátás nyílt a környező vidékre, felidézve bennünk az összes festői szépségű táj emlékét, melyeket az elmúlt napokban láthattunk. Életet is mentettünk. Egy fészkéből kiesett madárfiókát helyeztünk biztonságba.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/5_5_Nagybaromlak.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/5_5_Nagybaromlak.jpg
            alt: 01
            caption: Nagybaromlak
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/5_6_Nagybaromlak.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/5_6_Nagybaromlak.jpg
            alt: 02
            caption: Nagybaromlak
          - full: /assets/img/common/palyazatok/hatartalanul/hat_22/full/5_1_busz.jpg
            thumb: /assets/img/common/palyazatok/hatartalanul/hat_22/thumb/5_1_busz.jpg
            alt: 03
            caption: Hazafele
      - type: paragraph
        text: Szerencsések vagyunk, hogy lehetőséget kaptunk erre az erdélyi útra. Rengeteg tudással gazdagodtunk. Olyan határainkon kívül eső területeken játunk, ahol magyarul beszélnek, magyarként élnek az emberek. Megismerhettük hagyományaikat, népi kultúrájukat is. Minden általunk meglátogatott helyszínről előzetesen kiselőadásokkal készültünk, melyeket hol a hosszú út közben, hol a helyszíneken adtunk elő egymásnak. Esténként vetélkedőket szerveztünk, melyek során játékos formában mérhették össze frissen megszerzett tudásunkat tanulóink. Lefekvés előtt soha nem maradt el a közös játék a szabadban, vagy a társalgóban, ahol időnként spontán bulik is kialakultak. Még jobbá tette a kirándulást, hogy iskolánk székhelyének és tagintézményének diákjai közösen utaztak és a szállás is egy épületben volt. Így új barátságok is kialakultak, és többünkben is megfogalmazódott, hogy a jövőben is szívesen vennénk részt közös programokon. A hosszú buszúton sem unatkoztunk soha. Rengeteget nevettünk és énekeltünk. Maradandó élmény marad ez az út mindannyiunk számára, egy szép, örök emlék, mely akkor is összeköt majd bennünket, ha már nem járunk egy iskolába.

  - title: BS HAT19
    tab_images:
      - src: /assets/img/common/palyazatok/hatartalanul-logo.jpg
        alt: Határtalanul! pályázat
      - src: /assets/img/common/palyazatok/min-elnokseg-nemzetpol-allamtit.jpg
        alt: Miniszterelnökség Nemzetpolitikiai Államtitkárság
      - src: /assets/img/common/palyazatok/bga-logo.jpg
        alt: Bethlen Gábor Alapkezelő Zrt.
    content:
      - type: maintitle
        text: Királyok és fejedelmek nyomában Erdélyben
      - type: paragraph
        text: A Szegedi Petőfi Sándor Általános Iskola Bálint Sándor Tagiskolája 7. évfolyamos diákjai a Határtalanul! pályázatnak köszönhetően 2022. június 10–14. között Erdély csodaszép tájain barangolhattak.
      - type: paragraph
        text: Tanulmányi kirándulásunkat előkészítő tevékenység előzte meg, melynek során diákjaink felkészültek az útra. Végigtekintettük a kirándulás állomásait, annak történelmi, néprajzi és természeti-földrajzi vonatkozásait. Az információszerzést és a kutató-rendszerező munkát csoportokban, párokban és egyénileg végezték a gyerekek. Játékos vetélkedő a megszerzett információkat, az utazásunk során érintett királyok, fejedelmek életéről mélyítették a tanulók tudáselemeit, kötődésük a külhoni magyarok irányában erősödött.
      - type: heading
        text: Első nap
      - type: paragraph
        text: Első állomásunk Gyulafehérvár volt, ahol megismertük a székesegyház történetét, majd megkoszorúztuk a Hunyadi család síremlékét, miközben meghallgattuk a Hunyadi kardja című mondát. A Károly kapuról is érdekes információkat tudtunk meg a gyerekek kiselőadásából.
      - type: paragraph
        text: Utunkat folytatva Segesvár ódon utcáin sétáltunk, a Diákok lépcsőjén jutottunk fel a várba, majd az Óratornyot csodáltuk meg, miközben a történetéről hallgattunk beszámolót. Emellett Bem József életéről és a segesvári csatában betöltött jelentőségéről is megtudtunk új információkat.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/1_1_Gyulafehérvár.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/1_1_Gyulafehérvár.jpg
            alt: Gyulafehérvár
            caption: Gyulafehérvár
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/1_2_Segesvár.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/1_2_Segesvár.jpg
            alt: Segesvár
            caption: Segesvár
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/1_3_Fehéregyháza.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/1_3_Fehéregyháza.jpg
            alt: Fehéregyháza
            caption: Fehéregyháza
      - type: paragraph
        text: A Segesvár melletti Fehéregyházán található Petőfi-emlékműnél helyi idegenvezetőnk érdekes előadást tartott Petőfiről és a segesvári csatában vállalt szerepéről, valamint eltűnésének, halálának rejtélyeiről. Végül a Nemzeti dal közös elszavalásával emlékeztünk hősi halált halt költőnkre.
      - type: paragraph
        text: Ezután a szálláshelyünkre igyekeztünk, Zeteváraljára, amely Székelyudvarhelytől 34 kilométerre, a Hargita hegység délnyugati lábánál, a Nagyküküllő völgyében helyezkedett el.
      - type: heading
        text: Második nap
      - type: paragraph
        text: Következő nap utunk a Gyergyói-havasokban található Súgó-barlanghoz vezetett. Gyergyószentmiklósi idegenvezetőnk segítségével megismertük a barlang keletkezését, felfedezésének történetét és élővilágát. Ezután utunkat folytatva Erdély legszebb tavánál, a Gyilkos-tónál megismertük a tó legendáját. Idegenvezetőnk beszélt a tó kialakulásáról folyamatos feltöltődéséről, jövőjéről. Kirándulásunkat a Keleti-Kárpátok leghosszabb tektonikus eredetű szurdokvölgyében, a Békás-szorosban folytattuk. Megismertük a völgyet alkotó mészkő tulajdonságait, felhasználásának lehetőségeit, valamint a szerkezeti törésvonalak és a folyóvízi eróziót is megfigyelhettük. A Békás-szorosban a gyerekek ámulva nézték a vidék természeti kincseit, a hatalmas égbe nyúló sziklákat, a gyönyörű, meseszép tájat.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/2_1_Súgó-barlang.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/2_1_Súgó-barlang.jpg
            alt: A Súgó barlang
            caption: A Súgó barlang
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/2_2_Gyilkos-tó.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/2_2_Gyilkos-tó.jpg
            alt: A Gyilkos-tónál
            caption: A Gyilkos-tónál
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/2_3_Esti-szórakozás.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/2_3_Esti-szórakozás.jpg
            alt: Esti szórakozás
            caption: Esti szórakozás
      - type: paragraph
        text: Kirándulásunkat folytatva a Gyimesbükk felé vettük az irányt. Az ezeréves határnál megemlékeztünk hazánk Trianon előtti kiterjedéséről, annak természeti, gazdasági és kulturális értékéről. Majd megmásztuk a Rákóczi-vár romjait, és gyönyörködtünk a Moldva felé táruló csodálatos kilátásban. A vár tövében megnéztük a 30. számú vasúti őrházat, amely a Magyar Királyi Államvasutak legkeletibb őrháza volt.
      - type: heading
        text: Harmadik nap
      - type: paragraph
        text: Kirándulásunkat folytatva a Gyimesbükk felé vettük az irányt. Az ezeréves határnál megemlékeztünk hazánk Trianon előtti kiterjedéséről, annak természeti, gazdasági és kulturális értékéről. Majd megmásztuk a Rákóczi-vár romjait, és gyönyörködtünk a Moldva felé táruló csodálatos kilátásban. A vár tövében megnéztük a 30. számú vasúti őrházat, amely a Magyar Királyi Államvasutak legkeletibb őrháza volt.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/3_1_Gyimesbükki-szekerezés.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/3_1_Gyimesbükki-szekerezés.jpg
            alt: Gyimesbükki szekerezés
            caption: Gyimesbükki szekerezés
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/3_2_Sajtkészítés.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/3_2_Sajtkészítés.jpg
            alt: Sajtkészítés
            caption: Sajtkészítés
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/3_3_Sütögetés-az-esztenánál.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/3_3_Sütögetés-az-esztenánál.jpg
            alt: Sütögetés az esztenánál
            caption: Sütögetés az esztenánál
      - type: paragraph
        text: "Innen Gyimesközéplok felé vettük az irányt, ahol lovaskocsis túrát tettünk vendéglátónk esztenájához: itt részesei lehettünk a házi túrókészítésnek, és finomabbnál finomabb házi sajtokat kóstolhattunk, szalonnát és kolbászt sütöttünk."
      - type: paragraph
        text: A szállásra visszatérve dézsafürdőt vettek a kirándulásban megfáradt fiatalok, majd egy gyergyószentmiklósi osztállyal ismerkedtünk. A gyerekek hamar összebarátkoztak, közös játék, beszélgetés kezdődött.
      - type: heading
        text: Negyedik nap
      - type: paragraph
        text: "A napi program Székelyudvarhelyen indult: az Emlékezet parkjában ismerkedtünk a híres történelmi, irodalmi személyek életével, munkásságával."
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/4_1_emlékezet-parkja.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/4_1_emlékezet-parkja.jpg
            alt: Székelyudvarhely, Emlékezet parkja
            caption: Székelyudvarhely, Emlékezet parkja
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/4_2_A-parajdi-sóbánya.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/4_2_A-parajdi-sóbánya.jpg
            alt: A parajdi sóbánya
            caption: A parajdi sóbánya
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/4_3_a-taplász-mesternél.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/4_3_a-taplász-mesternél.jpg
            alt: A taplász mesternél
            caption: A taplász mesternél
      - type: paragraph
        text: Szejkefürdőn felkerestük Orbán Balázs polihisztor sírját, ahol elhelyeztük az emlékezés és tisztelet koszorúját, és végigsétáltunk a szabadtéri Székelykapu Múzeumban.
      - type: paragraph
        text: Ezután következett a parajdi sóbánya. Megismerkedtünk a sóbányászat történetével, és a sóterápia jelentőségével. Érdekes információkat tudtunk meg a bánya jelenlegi termékeiről, a földalatti gyógykezelésről, a sóterápiával kezelhető légúti betegségekről.
      - type: paragraph
        text: "Következő úticélunk Korondra vezetett: meglátogattunk egy helyi lakost, aki bükkfataplóból készít különböző használati tárgyakat, a gyerekek gyakorlatban is megtapasztalhatták egy ma is élő mesterség munkafolyamatait, a tapló megmunkálását."
      - type: paragraph
        text: Utolsó állomásunk e napon Farkaslaka volt, koszorút helyeztünk el Tamási Áron sírjánál, és megemlékeztünk az íróról.
      - type: paragraph
        text: A szállásra visszatérve ismét a gyergyószentmiklósi fiatalokkal töltötte az osztály az este nagy részét, a gyerekek vidáman, önfeledten játszottak, beszélgettek egymással.
      - type: heading
        text: Ötödik nap
      - type: paragraph
        text: Utazásunk utolsó napján először Szováta felé, a Medve-tó partjára vezetett utunk, ahol érdeklődve hallgattuk A tündérasszony könnye című mondát.
      - type: paragraph
        text: A következő megálló Kolozsvár volt. Megtekintettük Mátyás király és Bocskai István szülőházát, majd Mátyás király híres lovasszobránál fotózkodtunk.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/5_1_Kolozsvár.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/5_1_Kolozsvár.jpg
            alt: Kolozsvár
            caption: Kolozsvár
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/5_2_Kolozsvár-Mátyás-tér.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/5_2_Kolozsvár-Mátyás-tér.jpg
            alt: Kolozsvár, Mátyás tér
            caption: Kolozsvár, Mátyás tér
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_19/full/5_3_Királyhágó.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_19/thumb/5_3_Királyhágó.jpg
            alt: Királyhágó
            caption: Királyhágó
      - type: paragraph
        text: Utolsó erdélyi megállónk a Király-hágónál volt. A Partium és a történelmi Erdély határánál tudatosult bennünk, hogy hamarosan véget ér ez a csodás öt nap, amit Erdély vadregényes tájain töltöttünk.
      - type: paragraph
        text: Hazatérve, a következő napon osztályfőnöki órák keretében hetedikeseink értékelték a kiránduláson történteket, felidézték azokat a legismertebb történelmi és irodalmi nevezetességeket, helyeket, ahol jártunk, s amelyekkel a tanítási órákon már találkozhattak, vagy hamarosan találkozni fognak. Kiemelték minden egyes nap legjobb programját, megbeszélték és feldolgozták azt a sok új ismeretet, emléket, amire az út során szert tettek, s melyek életre szóló élménnyel megajándékozva őket, örökké emlékezetesek maradnak.
      - type: paragraph
        text: Mivel fontosnak tartjuk a tudásmegosztást is, ezért az alattunk lévő évfolyamnak képekkel, élményekkel színesített bemutató előadást tervezünk szeptember elejére, felkeltve érdeklődésüket, hiszen reményeink szerint a következő tanévben ők is részt vehetnek a Határtalanul program keretében egy tanulmányi kiránduláson.
      - type: paragraph
        text: Elmondhatjuk, hogy nagyon sokat dolgoztunk ez idő alatt, de az új ismeretek, élmények, a határon túl élő magyarság megismerése, magyarság tudatunk erősödése feledtette velünk ezt. Hisszük, hogy a közös élmények tovább mélyítik az együttműködés lehetőségét, a tanulók megismerik egymás kultúráját, életvitelét és hagyományait, ezáltal nyitottabbá és toleránsabbakká válnak.
      - type: paragraph
        text: Ungerné Fekete Mónika osztályfőnök

  - title: BS HAT18
    tab_images:
      - src: /assets/img/common/palyazatok/hatartalanul-logo.jpg
        alt: Határtalanul! pályázat
      - src: /assets/img/common/palyazatok/min-elnokseg-nemzetpol-allamtit.jpg
        alt: Miniszterelnökség Nemzetpolitikiai Államtitkárság
      - src: /assets/img/common/palyazatok/bga-logo.jpg
        alt: Bethlen Gábor Alapkezelő Zrt.
    content:
      - type: maintitle
        text: Történelmi megállók Erdélyben
      - type: paragraph
        text: A Bálint Sándor Tagiskola hetedik osztályos tanulói 2019. május 23-27. között a Határtalanul program keretében Erdélybe látogatott.
      - type: paragraph
        text: Az utazás előtti hetek lázas készülődéssel teltek. A tanárok segítségével a gyerekek megismerkedtek az utazás programjával, Erdély történelmével, földrajzával, a trianoni békeszerződés tragikus következményeivel. A gyerekek önállóan felkészültek arra is, hogy idegenvezetőként kalauzolják majd társaikat egy-egy helyszínen. Iskolánk egyik tanára a Délvidékről származik. Egy délutáni beszélgetésen a tanárnő mesélt a határon túli magyarság nehéz életéről. Mivel a program része volt egy gyerekotthon meglátogatása, a gyerekek ajándékcsomagokat állítottak össze a Segesváron élő fiúknak, lányoknak. Egy-egy általuk készített, megírt képeslap is belekerült a csomagba.
      - type: heading
        text: Első nap
      - type: paragraph
        text: Csütörtökön hajnal 4 órakor keltünk útra. Ezen a napon több mint 600 kilométernyi út várt ránk. Déván felvonóval mentünk a várba, Gyulafehérváron körbejártuk a történelmi belvárost és elhelyeztük koszorúnkat a Hunyadiak síremlékénél a székesegyházban. Segesváron megmásztuk a Diákok lépcsőjét, barangoltunk a város csodálatos ódon épületei között. De a legnagyobb izgalommal a gyerekotthonba tett látogatást várták a tanulóink. Bár rövid időt tudtunk ott tölteni, mindenki szívét megmelengette ez a különleges találkozás.
      - type: paragraph
        text: Még egy érdekes élményben volt részünk Nagybaromlakán. A települést szászok lakták egykor. A Ceaucescu rezsim alatt, 2 ember kivételével, elhagyták otthonaikat az itt élők és Németországba költöztek. Lám, más nemzeti kisebbségnek is a magyarokéhoz hasonló, nehéz sors jutott. A település egy különleges erődtemplommal dicsekedhet. Megtudtuk, hogy a falu lakói itt őrizték az élelem-tartalékaikat a középkorban, a gyakori tatár, török betörések idején.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/1_1_arvahaz.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/1_1_arvahaz.jpg
            alt: Segesvári gyermekotthon
            caption: Segesvári gyermekotthon
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/1_2_gyulafehervar.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/1_2_gyulafehervar.jpg
            alt: Gyulafehérvár
            caption: Gyulafehérvár
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/1_3_segesvar.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/1_3_segesvar.jpg
            alt: Segesvár
            caption: Segesvár
      - type: paragraph
        text: Este nyolc óra volt, mire megérkeztünk Zeteváraljára, a szállásunkra. Bőséges vacsora, és lélegzetelállító, gyönyörű környezet várt ránk. Gyorsan elfoglaltuk szállásunkat, és rövid idő múlva az egész társaság mély álomba merült.
      - type: heading
        text: Második nap
      - type: paragraph
        text: Második nap is sok kitűnő programmal várt bennünket. Elsőként Szejkefürdőn tisztelegtünk Orbán Balázs sírjánál. Az egyik kis idegenvezetőnk a székelykapuk titkait mondta el nekünk, miközben a szabadtéri múzeum kapui alatt haladtunk. Majd a parajdi sóbánya gyomra nyelt el bennünket néhány kellemes órára.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/2_1_parajd.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/2_1_parajd.jpg
            alt: Parajdi sóbánya
            caption: Parajdi sóbánya
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/2_2_korond.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/2_2_korond.jpg
            alt: Székelykapu Korondon
            caption: Székelykapu Korondon
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/2_3_korond_taplasz_mester.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/2_3_korond_taplasz_mester.jpg
            alt: Taplász mester Korondon
            caption: Taplász mester Korondon
      - type: paragraph
        text: Korondon egy igen ritka foglalkozás rejtelmeibe vezettek be minket. Egy taplász mester mutatta meg, hogyan készül tapló gombából megannyi szép használati tárgy, dísz. Szomorúan hallottuk, hogy a mesterség kihalófélben van. Ennek egyik oka az, hogy a globális felmelegedés miatt egyre kevesebb a felhasználható alapanyag.
      - type: paragraph
        text: Természetesen mi sem hagytuk ki a bazár soron a sétát, a vásárlást.
      - type: heading
        text: Harmadik nap
      - type: paragraph
        text: A harmadik nap a természet alkotta csodáké volt. Egy helyi, székely idegenvezető csatlakozott hozzánk. Élveztük ízes beszédét, kiváló humorát. Felvitt bennünket egy hegyre, a Súgó nevű cseppkőbarlangba. Izgalmas volt a sötét helyen, elem lámpával, egymásba kapaszkodva körbe járni. Ezután a Békás-szoroshoz mentünk. Útközben úgy tűnt, elhagyott bennünket a szerencse, mert elkezdett zuhogni az eső. De mire kiszálltunk a buszból csillapodott és végig sétálhattuk a szorost, megcsodálva a természet erejét.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/3_1_sugo_barlang.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/3_1_sugo_barlang.jpg
            alt: Túra a Súgó barlanghoz
            caption: Túra a Súgó barlanghoz
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/3_2_bekas-szoros.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/3_2_bekas-szoros.jpg
            alt: Békás-szoros
            caption: Békás-szoros
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/3_3_gyilkos-to.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/3_3_gyilkos-to.jpg
            alt: A Gyilkos-tónál
            caption: A Gyilkos-tónál
      - type: paragraph
        text: Visszafelé úton megálltunk a Gyilkos-tónál, ahol tanulói kiselőadásból megtudhattuk a tó legendája mellett a valós történetét is. A tó gyönyörű volt. Persze nem hagytuk ki a világ legfinomabb kürtös kalácsát sem. Ezen az estén sem kellett álomba ringatni senkit.
      - type: heading
        text: Negyedik nap
      - type: paragraph
        text: A negyedik nap volt a kirándulás csúcspontja. Ellátogattunk az ezer éves határhoz Gyimesbükkre. Könnyes szemmel hallgattuk házigazdánk elbeszélését a csángók nehéz sorsáról. Majd megmásztuk a Rákóczi vár romjait megcsodálva a csodálatos kilátást Moldva felé. A vár tövében megnéztük a 30. számú vasúti őrházat és a benne lévő vasúttörténeti kiállítást, amely a Magyar Királyi Államvasutak legkeletibb őrháza volt. A hely különlegességét az adta számunkra, hogy Nagyistók tanárnő nagyapja 1941-ben itt teljesített vasúti őrszolgálatot.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/4_1_gyimes.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/4_1_gyimes.jpg
            alt: Gyimesbükk, Rákóczi vár
            caption: Gyimesbükk, Rákóczi vár
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/4_2_gyimes.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/4_2_gyimes.jpg
            alt: Gyimesbükk, Rákóczi vár
            caption: Gyimesbükk, Rákóczi vár
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/4_3_gyimes.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/4_3_gyimes.jpg
            alt: A „székely jakuzzi”
            caption: A „székely jakuzzi”
      - type: paragraph
        text: "Ezután lovas kocsikra ültünk és a Tatros patak völgyében felkapaszkodtunk házigazdánk esztenájába. A hegyen megtanultuk, hogyan készül a sajt. A hihetetlenül zöld hegyek között fogyasztottuk el az ebédünket, puliszkát házi túróval, nyárson sült szalonnát, friss házi kenyérrel. A frissen készült sajtot mindenkinek nagyon ízlett. Szomjunkat friss forrásvízzel oltottuk. Itt értettük meg Wass Albert fájdalmas sorait: „Adjátok vissza a hegyeimet!”"
      - type: paragraph
        text: Szállásunkon különleges meglepetés várt ránk. Kipróbálhattuk a „székely jakuzzit”, ami egy felfűthető hatalmas dézsa volt a patak partján. Nagyot pancsoltunk benne.
      - type: paragraph
        text: Az utolsó este közös sportolással zárult. Közben a gyerekek az elmúlt napok élményeiről beszélgettek.
      - type: heading
        text: Ötödik nap
      - type: paragraph
        text: Az ötödik nap reggelén búcsút intettünk Zeteváraljának. Irány hazafelé!
      - type: paragraph
        text: Természetesen most sem hagytuk ki az utunkba eső látnivalókat. Szovátán körbe sétáltuk a Medve-tavat. Útközben megcsodáltuk a Tordai-hasadékot, majd Torockó házainak egyedisége elragadtatott bennünket.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/5_1_szovata_medve_to.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/5_1_szovata_medve_to.jpg
            alt: Szovátán a Medve-tónál
            caption: Szovátán a Medve-tónál
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/5_2_torocko.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/5_2_torocko.jpg
            alt: Torockón a Székelykő alatt
            caption: Torockón a Székelykő alatt
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_18/full/5_3_kiraly-hago.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_18/thumb/5_3_kiraly-hago.jpg
            alt: A Király-hágónál
            caption: A Király-hágónál
      - type: paragraph
        text: Utolsó erdélyi megállónk a Király-hágónál volt. A Partium és a történelmi Erdély határánál fájó szívvel és az ide még egyszer visszatérünk fogadalommal léptük át a határt.
      - type: paragraph
        text: "Másnap az iskolában hozzákezdtünk a következő nagy, közös feladatunkhoz, a nemzeti összetartozás napi megemlékező műsorunkhoz. Június 4-én, szívünkben az erdélyi emlékekkel álltunk társaink elé. Az egész iskola együtt énekelte az Ismerős Arcok szívszorító sorait: „mi egy vérből valók vagyunk”. Mi frissen szerzett székely barátainkra gondoltunk közben."

  - title: BS HAT17
    tab_images:
      - src: /assets/img/common/palyazatok/hatartalanul-logo.jpg
        alt: Határtalanul! pályázat
      - src: /assets/img/common/palyazatok/min-elnokseg-nemzetpol-allamtit.jpg
        alt: Miniszterelnökség Nemzetpolitikiai Államtitkárság
      - src: /assets/img/common/palyazatok/bga-logo.jpg
        alt: Bethlen Gábor Alapkezelő Zrt.
    content:
      - type: maintitle
        text: Erdély kincseinek nyomában
      - type: paragraph
        text: Az Emberi Erőforrások Minisztériuma által meghirdetett Határtalanul pályázat keretében iskolánk hetedik osztályos tanulóival 2017. augusztus 24-28. között Erdélybe látogattunk, hogy megismerjük Székelyföld természeti szépségeit, Erdély semmihez nem hasonlítható természeti gazdagságát, s betekinthessünk a külhoni magyarság életébe.
      - type: paragraph
        text: Komplex programunk összeállításának konkrét célja az volt, hogy tanítványaink saját élményeiken keresztül tapasztalják meg, amit már irodalomból, történelemből, földrajzból, természetismeretből elsajátítottak korábbi tanulmányaik során, s így váljon az bevésődött, könnyen felidézhető, emlékekhez köthető tudássá. Tanulmányi kirándulásunk a külhoni magyarsággal kapcsolatos ismeretek bővítésére, a magyarországi és külhoni fiatalok közötti kapcsolatok kialakulásának elősegítésére is remek lehetőséget adott. A kirándulás során erősíteni kívántuk magyarságtudatukat, hazaszeretetüket is, hogy megértsék a magyar nemzet összetartozását, átérezzék Trianon tragédiáját.
      - type: paragraph
        text: Ráhangolódásként előkészítő foglalkozásokat tartottunk, melyek során tanulóink megismerkedtek a határainkon túl élő magyarság létszámával, az államhatáron kívüli elhelyezkedés történelmi okaival, a meglátogatandó ország magyarságának történetével és jelenével.
      - type: paragraph
        text: Előzetesen feladatokat, kiselőadásokat vállaltak a tanulók, s ezeket lelkiismeretesen, színvonalasan készítették el. Az út során figyelmesen hallgatták egymás beszámolóit.
      - type: heading
        text: Első nap
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/1_deva1.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/1_deva1.jpg
            alt: Déva vára
            caption: Déva vára
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/1_deva2.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/1_deva2.jpg
            alt: Déva váránál
            caption: Déva váránál
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/1_deva3.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/1_deva3.jpg
            alt: Déva váránál
            caption: Déva váránál
      - type: paragraph
        text: Barangolásunk első állomásaként Déva várához látogattunk el. Felidéztük a vár építéséhez kötődő népballadát, a Kőmíves Kelemennét.
      - type: paragraph
        text: Utunkat Gyulafehérvár felé folytattuk, ahol megkoszorúztuk a Hunyadi család síremlékét.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/1_feheregyhaza1.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/1_feheregyhaza1.jpg
            alt: A Petőfi-emlékmű Fehéregyházán
            caption: A Petőfi-emlékmű Fehéregyházán
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/1_feheregyhaza2.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/1_feheregyhaza2.jpg
            alt: A Petőfi-emlékmű Fehéregyházán
            caption: A Petőfi-emlékmű Fehéregyházán
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/1_gyulafehervar1.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/1_gyulafehervar1.jpg
            alt: Gyulafehérváron
            caption: Gyulafehérváron
      - type: paragraph
        text: A Segesvár melletti Fehéregyházán található Petőfi-emlékműnél a Nemzeti dal közös elszavalásával emlékeztünk a csatamezőn hősi halált halt költőnkre. Ezután a szálláshelyünkre igyekeztünk, Zeteváraljára, amely Székelyudvarhelytől 34 kilométerre a Hargita hegység délnyugati lábánál, a Nagyküküllő völgyében helyezkedett el.
      - type: heading
        text: Második nap
      - type: paragraph
        text: Második nap felkapaszkodtunk a Gyergyói-havasokban megbújó Súgó-barlanghoz. Egy idegenvezető segítségével megismertük a barlang keletkezését, felfedezésének történetét és élővilágát. Délután megcsodáltuk a Gyilkos-tavat és a Békás-szorost.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/2_sugo_barlang1.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/2_sugo_barlang1.jpg
            alt: Súgó-barlang
            caption: Súgó-barlang
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/2_bekas-szoros.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/2_bekas-szoros.jpg
            alt: A Békás-szorosnál
            caption: A Békás-szorosnál
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/2_gyilkos_to1.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/2_gyilkos_to1.jpg
            alt: A Békás-szorosnál
            caption: A Békás-szorosnál
      - type: paragraph
        text: Sikaszón Sütő András nyári lakjához sétáltunk el. Megismerkedtek a tanulók az író életpályájával, és részleteket olvastunk fel Gyermekkorom tükörcserepei című írásából.
      - type: heading
        text: Harmadik nap
      - type: paragraph
        text: A harmadik napon Csíksomlyón felkerestük az évente több ezer embert vonzó zarándokhelyet, megismertük az ottani búcsú hagyományait.
      - type: paragraph
        text: Kirándulásunkat folytatva Gyimesközéplokon lovaskocsis túrát tettünk vendéglátónk esztenájához, ahol részesei lehettünk a házi túrókészítésnek, és finomabbnál finomabb házi sajtokat kóstolhattunk.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/3csiksomlyo.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/3csiksomlyo.jpg
            alt: Csíksomlyón
            caption: Csíksomlyón
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/3_gyimes1.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/3_gyimes1.jpg
            alt: Lovaskocsis túra Gyimesközéplokon
            caption: Lovaskocsis túra Gyimesközéplokon
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/3_1000_eves_hatar.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/3_1000_eves_hatar.jpg
            alt: Az ezeréves határnál
            caption: Az ezeréves határnál
      - type: paragraph
        text: Innen Gyimesbükk felé vettük az irányt. Kimerítő sétát tettünk az 1000 éves határnál, megemlékeztünk hazánk Trianon előtti kiterjedéséről, annak természeti, gazdasági és kulturális értékéről.
      - type: heading
        text: Negyedik nap
      - type: paragraph
        text: A negyedik napon Szejkefürdőn meglátogattuk Orbán Balázs néprajzgyűjtő sírját, és végigsétáltunk a szabadtéri Székelykapu Múzeumban.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/4_szejkefurdo_szekelykapu_muz.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/4_szejkefurdo_szekelykapu_muz.jpg
            alt: Székelykapu Múzeum Szejkefürdőn
            caption: Székelykapu Múzeum Szejkefürdőn
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/4_korond1.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/4_korond1.jpg
            alt: Korondon
            caption: Korondon
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/4_parajd.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/4_parajd.jpg
            alt: A parajdi sóbányában
            caption: A parajdi sóbányában
      - type: paragraph
        text: Farkaslakán koszorút helyeztünk el Tamási Áron sírjánál, és az íróra emlékezve részletet olvastunk fel az Ábel a rengetegben című regényéből.
      - type: paragraph
        text: "Ezután Korondra látogattunk. Itt a gyerekek gyakorlatban is megtapasztalhatták egy ma is élő mesterség munkafolyamatait: a tapló megmunkálását. Megismerkedtünk egy helyi lakossal, aki bükkfataplóból készít különböző használati tárgyakat."
      - type: paragraph
        text: Utolsó állomásunk e napon a parajdi sóbánya volt. Egy idegenvezető megismertetett bennünket a sóbányászat történetével, és a sóterápia jelentőségével. Érdekes információkat tudtunk meg a bánya jelenlegi termékeiről, a földalatti gyógykezelésről, a sóterápiával kezelhető légúti betegségekről. Megismerkedtünk a bányában található kápolna névadójának, Nepomuki Szent Jánosnak az életével, legendájával.
      - type: paragraph
        text: Parajdon ellátogattunk Áprily Lajos szülőházához is.
      - type: paragraph
        text: Székelyudvarhelyen a református gimnázium előtt Kányádi Sándorra emlékeztünk.
      - type: heading
        text: Ötödik nap
      - type: paragraph
        text: Az ötödik napon utunk először Szováta felé, a Medve-tó partjára vezetett, ahol érdeklődve hallgattuk A tündérasszony könnye című mondát.
      - type: paragraph
        text: Ezután a Csucsán lévő Ady-emlékházat tekintettük meg.
      - type: paragraph
        text: Majd Erdély kapuját, a közeli Király-hágót csodáltuk meg.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/5_csucsa_ady_emlekhaz1.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/5_csucsa_ady_emlekhaz1.jpg
            alt: Csucsa, Ady-emlékház
            caption: Csucsa, Ady-emlékház
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/5_kiralyhago.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/5_kiralyhago.jpg
            alt: A Király-hágónál
            caption: A Király-hágónál
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/5_tordaihasadek.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/5_tordaihasadek.jpg
            alt: A Tordai-hasadék
            caption: A Tordai-hasadék
      - type: paragraph
        text: Erdélyi barangolásunk Nagyszalontán fejeződött be, Arany János szülőházánál, ahol koszorút helyeztünk el emlékezve nagy költőnkre.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/bs/palyazatok/hatartalanul/hat_17/full/5_nagyszalonta.jpg
            thumb: /assets/img/bs/palyazatok/hatartalanul/hat_17/thumb/5_nagyszalonta.jpg
            alt: Nagyszalonta
      - type: paragraph
        text: Rengeteg élménnyel gazdagodva tértünk haza erről a felejthetetlen kirándulásról!
      - type: paragraph
        text: Köszönet az iskola vezetésének a támogató együttműködésért!
