      - type: paragraph
        text: Ezt követően elindultunk Csíksomlyóra, ahol megkóstoltuk a borvizet és túráztunk a híres búcsújáróhelyen is. A csíksomlyói kegytemplomot is megtekintettük.
      - type: heading
        text: Negyedik nap
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_17/4_gyimesbukk_1.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_17/4_gyimesbukk_1_small.jpg
