            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_17/4_gyimeskozeplok_small.jpg
            alt: Nyársazás
            caption: Nyársazás
      - type: paragraph
        text: "Erdélyi tartózkodásunk negyedik napján egy újabb festői szépségű táj megtekintésére volt lehetőségünk: Gyimesbükkbe látogattunk el. Itt egy helyi idegenvezető megismertette velünk a gyimesi csángók történetét, megmutatta nekünk az ezeréves határt, valamint a Rákóczi-vár romjait. Lovaskocsival mentünk fel a hegyek közé, ahol egy esztenánál szalonnát és kolbászt sütöttünk, házi készítésű sajtot és túrót kóstoltunk. Megismerkedtünk Juhásszal, a terelőkutyával, aki minden este segít hazaterelni a gazdaság teheneit."
      - type: paragraph
        text: A helyi tehetséges fiatalok népviseleti ruháikban mutatták be nekünk táncaikat, és egy közös, jó hangulatú körtáncra is invitáltak minket.
      - type: heading
        text: Ötödik nap
      - type: paragraph
        text: Az ötödik nap ismét az utazásról szólt. Szívünkben vegyes érzésekkel indultunk haza. Egyrészt sajnáltuk, hogy vége a csodás kalandoknak, másrészt örültünk, hogy este végre viszontláthatjuk a családunkat. Útközben megálltunk a Király-hágónál, ahonnan visszatekinthettünk Erdély hegyeire, felidéztük magunkban a festői szépségű tájakat, melyeket lehetőségünk volt látni az elmúlt napokban.
