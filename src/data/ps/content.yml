            caption: Nagyszalontán
      - type: paragraph
        text: Utolsó állomásunk Nagyszalontán volt, ahol Arany János szülőházánál sok-sok érdekességet hallhatunk a költő gyerekkoráról. Itt helyeztük el az utolsó koszorúnkat, majd a határ felé vettük utunkat.
      - type: paragraph
        text: Szerencsések vagyunk, hogy lehetőséget kaptunk erre az erdélyi kirándulásra, mely maradandó élmény mindannyiunk számára, egy szép, örök emlék, mely akkor is összeköt majd minket, ha már nem leszünk együtt a mindennapokban.
