sections:
  - title: PS HAT24
    content:
      - type: maintitle
        text: Erdélyország gyöngyszemei
      - type: date
        text: 2025. 04. 30. – 2025. 05. 04.
      - type: paragraph
        text: „Ezt a naplót azért írtuk, mert annyi király dolog történt velünk, hogy kár lenne csak magunknak megtartani! Így legalább ti is bepillanthattok, mi mindenről maradtatok le – iskolatársak, családtagok, barátok, figyelem! 😄”
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/01.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/01.jpg
            alt: Kép 1
      - type: paragraph
        text: 'Valamikor nyáron jött a nagy hír: az iskolánk pályázik a Határtalanul! programra!'
      - type: paragraph
        text: 'Ha nyerünk, öt teljes napot Erdélyben tölthetünk együtt! Először csak néztünk nagyokat, aztán jöttek a fülig érő mosolyok – ez tutira valami izgalmas lesz!'
      - type: paragraph
        text: 'Aztán vártunk... vártunk... még egy kicsit vártunk... és egyszer csak novemberben a Facebook-csoportban megjelent egy üzenet: NYERTÜNK! Megyünk!'
      - type: paragraph
        text: 'Aki ezt olvasta, tuti nem bírta ki ugrálás nélkül!'
      - type: paragraph
        text: 'Tudtuk, hogy sok előkészület lesz, de ez senkit nem zavart. Már akkor éreztük, hogy ez a kirándulás nem olyan lesz, mint a többi. Öt nap Erdélyben? Naná, hogy már akkor elkezdtük visszaszámolni a napokat!'
      - type: paragraph
        text: 'Ahogy jött a tavasz, minden komolyabb lett. Osztályfőnöki órákon egyre többet beszéltünk az útról, és jöttek az előkészítő foglalkozások is. Volt itt történelem, földrajz, beszélgetés, kérdezz-felelek. Viki néni olyan érdekesen mesélt Erdély múltjáról, a fejedelmekről meg mindenféle kalandos dolgokról, hogy még azok is figyeltek, akik amúgy nem szoktak (nem mondunk neveket 😄).'
      - type: paragraph
        text: 'Földrajzórán megtanultuk, hol vannak a hegyek, folyók, városok – és közben már elképzeltük, hogy mi is ott állunk majd.'
      - type: paragraph
        text: 'Gyöngyi néni pedig megtanított minket a székely himnuszra. Eleinte elég komornak tűnt, de a végére úgy énekeltük, mint egy kórus – tiszta szívből. Még a népi hangszerekről is tanultunk, de nem ám unalmasan – inkább nevetve, játékosan.'
      - type: paragraph
        text: 'Az előkészítő órákon nem csak beszélgettünk, hanem „utaztunk” is! Még el sem indultunk Erdélybe, de a Határtalanul! Barangoló digitális tartalmak segítségével máris ott éreztük magunkat. A számítógépen olyan képeket, és feladatokat láttunk, amik megmutatták, milyen helyekre fogunk menni, és mikor odaértünk, már ismerősnek tűntek.'
      - type: paragraph
        text: 'Az utolsó előkészítőóra már tényleg az utolsó simításokról szólt. Megbeszéltük a részleteket, és a szüleink segítségével ajándékcsomagokat is készítettünk az ottani gyerekeknek. A szülők legalább annyira izgultak, mint mi – volt, aki háromszor is rákérdezett, hogy biztos be van-e csomagolva a fogkefe.'
      - type: paragraph
        text: 'Viki néni még a személyi igazolványokat is jó előre begyűjtötte – biztos, ami biztos, nehogy valaki otthon hagyja. (Ezért szeretjük őt!)'
      - type: heading
        text: 1. nap – Indulás és az első nagy kalandok
      - type: paragraph
        text: 'Hajnalban a rigókkal keltünk és 5-kor már mindenki a buszmegállóban toporgott, hatalmas szemekkel. Érdekes, most senki nem aludt el, mint iskolaidőben az első órákról.'
      - type: paragraph
        text: 'Gyorsan a határhoz értünk, ahol minden fennakadás nélkül átjutottunk. Az első megállónk Déva vára volt. Már messziről kiszúrtuk a felvonót, és izgatottan vártuk, hogy végre felszállhassunk rá. Amikor odaértünk, kiderült, hogy sajnos épp javítják. Sebaj, gondoltuk, nekivágunk gyalog! Jólesett egy kis mozgás a hosszú buszozás után, és közben egyre közelebb került hozzánk a hatalmas szikla tetején álló vár.'
      - type: paragraph
        text: 'A vár 250 méter magas dombon trónol – olyan volt, mintha egy mesébe csöppentünk volna. Ott fenn a sziklán sétálgatni igazi különleges élmény volt, még akkor is, ha közben lecsorgott rólunk a víz a melegtől.'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/02.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/02.jpg
            alt: Kép 1
      - type: paragraph
        text: 'Ezután irány Gyulafehérvár!'
      - type: paragraph
        text: 'Már ismerősen csengett a neve – ugye, az Egri csillagokban is szó volt róla! Ráadásul Viki néni is sokat mesélt nekünk erről a városról, különösen Hunyadi Jánosról, meg a fiáról, Lászlóról. Már alig vártuk, hogy élőben is láthassuk azt a híres, ezeréves székesegyházat!'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/03.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/03.jpg
        alt: Kép 1
      - type: paragraph
        text: 'Amikor beléptünk, egy pillanatra mindenki elnémult. Komolyan, mintha megállt volna az idő – csak bámultuk a hatalmas, gyönyörű templomot. Tátott szájjal, csillogó szemmel.'
      - type: paragraph
        text: 'Megkerestük a Hunyadiak sírjait, és elhelyeztük a koszorúnkat. Az egyik Hunyadi Jánosé volt, akiről mindenki tudja, hogy igazi hős volt, a másik pedig a fiáé, Lászlóé – akinek szomorú véget ért az élete. Ez a pillanat egy kicsit csendesebb, meghatóbb volt. Olyan igazi „emlékezzünk együtt” érzés.'
      - type: paragraph
        text: 'Aztán tovább indultunk – és csak később jöttünk rá, hogy még mennyi utazás vár ránk aznap…'
      - type: paragraph
        text: 'Déva és Gyulafehérvár után Nagybaromlak felé vettük az irányt (igen, tényleg így hívják! 😄). Itt egy régi szász erődtemplomot néztünk meg – és ami a legmenőbb: ezt a templomot még ma is használják azok a szászok, akik ott élnek. Képzeljétek el, milyen lehet egy ilyen több százéves templomba járni vasárnaponként!'
      - type: paragraph
        text: 'De a legizgalmasabb rész csak ezután jött: felmászhattunk a csigalépcsőkön egészen a harangokig! '
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/04.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/04.jpg
            alt: Kép 1
      - type: paragraph
        text: 'Na, ez nem volt semmi… A lépcső szűk volt, meredek, minden lépésnél nyikorgott valami – olyan érzésünk volt, mintha bármelyik pillanatban elszállhatnánk az időben. Volt, aki meg se mert mozdulni ott fönt!'
      - type: paragraph
        text: 'És akkor valaki – neveket most se mondunk 😄 – megkongatta a harangot. Hát, azt hittük, ott helyben kiugrik a szívünk! A hangja akkora volt, hogy még percekig csengett a fülünkben.'
      - type: paragraph
        text: 'Innen aztán végre a szállásunkra indultunk – irány Székelyvarság, egészen pontosan a Csorgókő Panzió!'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/05.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/05.jpg
            alt: Kép 1
      - type: paragraph
        text: 'Már nagyon vártuk, hogy megérkezzünk, mert a sok utazás és a lépcsőmászás után mindenki kicsit „lemerült”. De amikor megérkeztünk, azonnal jobb kedvünk lett – nagyon kedvesen fogadtak minket, szinte úgy éreztük, mintha hazaértünk volna.'
      - type: paragraph
        text: 'A hab a tortán a meleg vacsora volt! Az illatok már a folyosón becsaptak minket, és amikor leültünk enni, csak annyit mondtunk: „Ez most nagyon kellett!”'
      - type: paragraph
        text: 'Finom volt, laktató, és utána már csak egy vágyunk volt: ágy és alvás. (Na jó, egy kis beszélgetés még belefért a szobákban, de aztán tényleg kidőltünk.)'
      - type: heading
        text: 2. nap – barlang, tó, híd és kürtőskalács
      - type: paragraph
        text: 'Másnap korán reggel már úton is voltunk – irány a Súgó-barlang!'
      - type: paragraph
        text: 'A túravezetőnk egy nagyon laza, vicces bácsi volt, Robi, aki egész nap velünk tartott, és annyi érdekességet mesélt, hogy néha még jegyzetelni is kedvünk lett volna (na jó, csak majdnem 😄).'
      - type: paragraph
        text: 'A barlangig vezető út nem volt piskóta – meredek hegyoldalon kellett felfelé kapaszkodni, de mi hősiesen kitartottunk! És amikor végre beértünk a barlangba… hát, minden fáradtságot megért. Cseppkövek mindenütt, mintha egy varázslatos mesevilágba csöppentünk volna.'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/06.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/06.jpg
            alt: Kép 1
      - type: paragraph
        text: 'A legizgibb rész még csak ezután jött: Robi szólt, hogy most mindenki kapcsolja le a zseblámpát. Először csak nevetgéltünk, aztán beállt a totális sötétség és csönd. Se fény, se hang – csak mi és a barlang. Furcsa és kicsit hátborzongató érzés volt, de közben nagyon különleges is. Olyasmi, amit az ember soha nem felejt el.'
      - type: paragraph
        text: 'A Súgó-barlang után újabb csoda következett: elmentünk a Gyilkos-tóhoz! Már a neve is sejteti, hogy nem akármilyen hely… Itt megjutalmaztuk magunkat egy finom kürtőskaláccsal, hogy legyen erőnk a következő túrához.'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/07.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/07.jpg
            alt: Kép 1
      - type: paragraph
        text: 'Mert bizony várt ránk a Békás-szoros is! Ez a hely egyszerűen lélegzetelállító – hatalmas sziklafalak, alattunk a Békás-patak, körülöttünk a természet minden csodája. Mintha egy képeslap közepén sétálnánk.'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/08.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/08.jpg
            alt: Kép 1
      - type: paragraph
        text: 'És hogy ne legyen túl könnyű a nap: át kellett mennünk egy függőhídon is!'
      - type: paragraph
        text: 'Na, ott volt sikítás, nevetés, óvatos lépések meg bátorítás. De végül mindenki átkelt – és nagyon büszkék voltunk magunkra!'
      - type: paragraph
        text: 'Este visszaértünk Székelyvarságra, ahol Zsuzsika néni újra valami csodát főzött. A szállásunk egy csodás, biztonságos helyen volt – igazi gyerekparadicsom! Minden este felszabadultan rohangálhattunk, focizhattunk, röpizhettünk, vagy csak egyszerűen együtt nevetgéltünk a játszótéren. Mindenki megtalálta a kedvenc elfoglaltságát, és ami még jobb: egymást is. Olyan jó volt ott lenni, hogy néha még vacsorára is nehéz volt behívni minket, nemhogy aludni küldeni!'
      - type: heading
        text: 3. nap – az ezer éves határ és az esztena meglepetései
      - type: paragraph
        text: 'Korán reggel indultunk Gyimesbe, ahol már várt ránk Fülöp bácsi.'
      - type: paragraph
        text: 'Először a Kontumáci kápolnánál álltunk meg, ahol Fülöp mesélt nekünk a csángók életéről. Tudtátok, hogy ők egy igazán különleges közösség? A valaha volt legkeletibb határvonalnál élnek, és az életük nem mindig könnyű – sokat küzdenek, hogy megőrizzék a hagyományaikat és a kultúrájukat.'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/09.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/09.jpg
            alt: Kép 1
      - type: paragraph
        text: 'Délután pedig a hegyek között töltöttük az időt, a Hidegség nevű helyen. Ott, a Muhos patak mellett volt egy esztena (ez olyan, mint egy régi parasztház meg a környéke), ahol szalonnát és kolbászt sütöttünk. Megmutatta a sajtkészítés minden lépését, és azt is, hogyan használják az oltógyomrot (ami... hát, nem volt a lányok kedvence, sőt, volt, aki kicsit rosszul is lett tőle 😄).'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/10.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/10.jpg
            alt: Kép 1
      - type: paragraph
        text: Hát, az ízek… egyszerűen mennyei volt!
      - type: paragraph
        text: Ott, a természet közepén, hallgattuk az itt élő emberek sokszor nagyon nehéz, de szép életútját. Egyszerre volt szomorú és nagyon különleges élmény is.
      - type: paragraph
        text: 'Este még egy meglepetés várt ránk: a helyi iskolások néptánc-bemutatója! A vezetőjük köszöntött minket, megmutatták a szép népi viseletüket, majd táncoltak, énekeltek nekünk – és képzeljétek, mikrofon nélkül! Olyan erősen és szépen énekeltek, hogy mindenkinek libabőrös lett a karja. Mi is bemutatkoztunk, elmondtuk, honnan jöttünk, és elénekeltük velük együtt a Tavaszi szél vizet áraszt című népdalt.'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/11.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/11.jpg
        alt: Kép 1
      - type: paragraph
        text: Valahogy ezen az estén mindenki megváltozott egy kicsit. Nem tudjuk megmagyarázni, de olyan érzésünk volt, mintha ez a közös éneklés és tánc összekötött volna minket. Ettől a perctől kezdve már nem csak osztálytársak voltunk, hanem egy igazi csapat. Barátkoztunk, nevettünk, táncoltunk – és ez volt az egyik legszebb este az egész út alatt.
      - type: heading
        text: 4. nap – sós levegő, zötyögés, vízesés és egy csipetnyi szomorúság
      - type: paragraph
        text: Reggel ismét korán kelés – már egész jól ment –, gyors reggeli, aztán szendvicsgyártás. Készülődtünk, mert sűrű nap várt ránk. Első állomásunk Szejkefürdő volt, ahol egy különleges székelykapus sétány vezetett fel Orbán Balázs sírjához. Ő egy híres székely író és utazó volt, aki sokat tett azért, hogy megismerjük Erdélyt. Koszorút is elhelyeztünk, ahogy ilyenkor illik.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/12.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/12.jpg
        alt: Kép 1
      - type: paragraph
        text: Ezután irány Parajd, ahol a sóbánya várt ránk! Már maga a lejutás is izgalmas volt, de odalent mindenkit elvarázsolt a hatalmas tér és a sós levegő. Nemcsak nézelődni lehetett, hanem hintázni, röpizni, tollasozni, és sokan minden játékot kipróbáltak.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/13.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/13.jpg
        alt: Kép 1
      - type: paragraph
        text: Délután szekerekkel mentünk a Csorgókő-vízeséshez – olyan volt, mintha egy igazi időutazásba csöppentünk volna! Rázkódott minden, de közben rengeteget nevettünk és beszélgettünk.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/14.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/14.jpg
        alt: Kép 1
      - type: paragraph
        text: A vízesés csodás volt, a víz csobogása teljesen lenyűgözött minket.
      - type: paragraph
        text: 'Utána felmásztunk az ötszintes kilátóra, ahonnan le a völgybe nézve egyszerűen lélegzetelállító volt a látvány. Székelyvarság dombjai olyan káprázatosan kanyarogtak előttünk, hogy még a legjobb festő is megirigyelhette volna!'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/15.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/15.jpg
            alt: Kép 1
      - type: paragraph
        text: 'Ott fent a kilátón állva tényleg éreztük, milyen szép a természet'
      - type: paragraph
        text: 'Este aztán elérkezett az utolsó vacsora, amit egyikünk sem akart igazán elhinni.'
      - type: paragraph
        text: 'De Zsuzsika néni megint meglepett minket valami szuper finomsággal: töltött káposzta, almáspite – és persze nem maradhatott el a házi leves sem. Mmm, az illatok már az asztalnál megfogtak minket!'
      - type: paragraph
        text: 'Miközben ettünk, megköszöntük neki meg a családjának, hogy ilyen jól éreztük magunkat náluk. Olyan megható pillanat volt, hogy többen csendben maradtunk – még a vidám csapatból is! Valahogy senki nem akart még hazamenni.'
      - type: paragraph
        text: 'Aznap este, amikor pakoltunk, mindenkiben ott motoszkált egy kis szomorúság. Mégiscsak vége lett a kalandnak… de tudtuk, hogy ez az út örökre megmarad a szívünkben.'
      - type: heading
        text: 5. nap – Petőfi nyomában és búcsú Erdélytől
      - type: paragraph
        text: 'Vegyes érzésekkel indultunk haza. Egyrészt nagyon sajnáltuk, hogy vége a fantasztikus kalandoknak, de azért örültünk is, mert este végre újra láthatjuk a családunkat.'
      - type: paragraph
        text: 'Első megállónk Fehéregyháza volt, ahol a Petőfi Múzeumba mentünk. Ott egy igazán izgalmas előadást hallgattunk meg, ami teljesen lekötött minket. Az előadás után elhelyeztünk egy koszorút Petőfi Sándor emlékére, és elénekeltük a Székely himnuszt – közösen, szívből.'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/16.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/16.jpg
            alt: Kép 1
      - type: paragraph
        text: 'Aztán Segesvárra érkeztünk, ahol sétáltunk egy nagyot a vár területén. Megmásztuk a híres Diákok lépcsőjét, és megnéztük Petőfi szobrát is. Itt már éreztük, hogy lassan tényleg búcsúzunk Erdélytől, de a szívünkben sok szép emlék maradt.'
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/17.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/17.jpg
      - type: paragraph
        text: 'Megkezdődött a hazautunk – kb. 6 óra buszozás várt ránk. Nagylaknál egy hatalmas kamionsor állt a határon, már azt hittük, sose jutunk át. De a sofőrünk profin tudta, hova kell sorolni, így gyorsan átvitt minket a határon. Este 8-kor visszaértünk Szegedre, ahol a szülők már alig várták, hogy újra lássanak minket.'
      - type: paragraph
        text: Elfáradtunk. De annyi mindent láttunk, tanultunk és átéltünk, hogy örökre megmarad bennünk.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_24/full/18.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_24/tumb/18.jpg
            alt: Kép 1
      - type: heading
        text: Értékelő óra – újra együtt, kicsit másképp
      - type: paragraph
        text: 'Miután hazaértünk, és mindenki kialudta magát (vagy legalábbis megpróbálta), tartottunk egy külön órát, ahol csak mi voltunk jelen – meg persze a felkészítő tanáraink, akik nélkül ez az egész nem jöhetett volna létre.'
      - type: paragraph
        text: 'Leültünk körben, és mindenki elmondhatta, mi volt számára a legjobb élmény, mit tanult, mi volt vicces, és mi volt nehéz. Jókat nevettünk, mert ahogy felidéztük a pillanatokat, újra ott éreztük magunkat Erdélyben. Közösen válogattunk képeket, amiket feltettünk az iskola Facebook-oldalára, és videókat is megnéztünk a digitális táblán. Néha felkiáltottunk: „Nézd, ott vagyok én is!” – vagy: „Mikor indulunk vissza, Erdélybe?”'
      - type: paragraph
        text: Sok emlék, sok nevetés, és egy kis hiányérzet, hogy véget ért.
      - type: heading
        text: Témanap
      - type: paragraph
        text: 'Úgy gondoltuk, hogy ezt a rengeteg dolgot, amit láttunk és történt velünk, azt mindenképpen érdemes megosztani a társainkkal, ezért szerveztünk egy kis bemutatót. Itt előadtuk a dalokat, amiket tanultunk, megkínáltuk őket az Erdélyből hozott lekváros kenyérrel és rengeteg élményt osztottunk meg velük.'
      - type: paragraph
        text: 'Röviden összefoglalva kedves naplónk, ezek történtek. '
      - type: paragraph
        text: 'Köszönjük az Emberi Erőforrás Minisztériumának a pályázati támogatást, a sok kedves embernek, akik segítettek minket az utunk során, és persze Viki és Rita néninek azt, hogy el mertek minket vinni ilyen messzire és végig gondoskodtak rólunk.'
  - title: PS HAT23
    content:
      - type: maintitle
        text: „Történelmi megállók Erdélyben”
      - type: date
        text: 2024. június 11–15.
      - type: paragraph
        text: Iskolánk hetedik osztályos tanulóival a Határtalanul! pályázat keretében 2024. június 11 - 15. között Erdélybe utazhattunk, ahol az ott eltöltött öt nap során rendkívül sok érdekes és izgalmas program várt bennünket.
      - type: paragraph
        text: Az utazás előtt tartott előkészítő órákon a diákok felidézték a trianoni békeszerződés során elcsatolt területeken élő magyarság történetét, illetve megismerhették a székely nép sorsát. Interaktív tananyag segítségével a népi hangszerekkel, hagyományokkal foglalkoztunk.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/busz.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/busz.jpg
            alt: Kép 1
      - type: heading
        # 1. nap
        text: Első nap
      - type: paragraph
        text: Az indulás napján nagyon korán kellett kelnünk, hiszen hosszú út állt előttünk. Hajnali négy órakor álmosan gyülekeztünk az iskola előtt a buszra várva. Kezdeti fáradtságunk hamar elszállt, hiszen a székelyvarsági szállásra vezető utunkat többször is megszakítottuk egy-egy izgalmas helyszínen.
      - type: paragraph
        text: Déva váránál álltunk meg először. Verőfényes napsütésben sétáltunk a gyönyörűen felújított vár területén, ahova a drótkötélpályás felvonó segítségével jutottunk el.
      - type: paragraph
        text: Folytattuk utunkat Gyulafehérvárra, ahol megtekintettük a székesegyházat, majd a Károly-kapun átsétálva megcsodáltuk a gyönyörű tájat.
      - type: images
        images_per_row: 2
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/Déva.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/Déva.jpg
            alt: Kép 3
            caption: Déva
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/Gyulafehérvár.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/Gyulafehérvár.jpg
            alt: Kép 4
            caption: Gyulafehérvár
      - type: heading
        text: Második nap'
      - type: paragraph
        text: Kirándulásunk második napjának reggelén ellátogattunk a székelyudvarhelyi Emlékezet parkjába, ahol 13 magyar király, író és egyéb híres ember szobránál tettük tiszteletünket. Ezután Szejkefürdőn jártunk, megtekintettük a Székelykapu Múzeumot és Orbán Balázs sírhelyét. Innen Korondra utaztunk és a verőfényes napsütésben helyi kézművesek termékeiből vásárolgattunk, majd egy egészen különös szakma művelőivel, taplász-mesterekkel ismerkedtünk meg. Megmutatták nekünk, hogy hogyan készítenek táskát, kendőt, sapkát és különböző dísztárgyakat taplógombából. Délután szekereken jutottunk el a Csorgókő-vízeséshez, majd az ötszintes kilátóról gyönyörködtünk Székelyvarság káprázatos domborzatában.
      - type: images
        images_per_row: 2
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/szejkefurdo.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/szejkefurdo.jpg
            alt: Kép 3
            caption: Szejkefürdő
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/korond.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/korond.jpg
            alt: Kép 4
            caption: Korond
      - type: images
        images_per_row: 2
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/Úton_b_Csorgókő_vízeséshez.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/Úton_a_Csorgókő_vízeséshez.jpg
            alt: Kép 3
            caption: Úton a Csorgókő vízeséshez
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/Székelyvarság_kilátó.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/Székelyvarság_kilátó.jpg
            alt: Kép 4
            caption: Gyulafehérvár
      - type: heading
        text: Harmadik nap
      - type: paragraph
        text: Kirándulásunk harmadik napján első utunk a Dani Gergely Általános Iskolába vezetett, ami a legkeletibb magyar iskola Gyimesbükkön. A helyi hetedik osztályosok, osztályfőnökük és az iskola igazgatója fogadott minket. Magával ragadó volt a gyermekek nyitottsága, vendégszeretete. Ez a közvetlenség hatott a mi diákjainkra is, akik örömmel vettek részt táncmulatságban, majd közös sporttevékenységben. Fájó szívvel köszöntünk el vendéglátóinktól, akikkel jó barátságot alakítottak ki gyermekek, pedagógusok egyaránt.
      - type: paragraph
        text: A délutánunkat a hegyek között folytattuk a Hidegségben. A Muhos patak mellett fekvő esztenánál szalonnát és kolbászt sütöttünk, valamint házi készítésű sajtot kóstoltunk. A helyi idegenvezető megismertette velünk a gyimesi csángók történetét. Hazafelé menet útba ejtettük az ezeréves határt is, ahol élő történelemórán vettünk részt. Megható volt az itt élő emberek viszontagságos életútját hallgatni ebben a gazdag természeti környezetben.
      - type: images
        images_per_row: 2
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/Dani_Gergely_Általános_Iskola.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/Dani_Gergely_Általános_Iskola.jpg
            alt: Kép 3
            caption: Dani Gergely Általános Iskola
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/muhos_patak_mellett.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/muhos_patak_mellett.jpg
            alt: Kép 4
            caption: A Muhos patak mellett
      - type: images
        images_per_row: 2
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/sutogetes_az_esztenanal.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/sutogetes_az_esztenanal.jpg
            alt: Kép 3
            caption: Sütögetés az esztenánál
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/ezereves_hatarnal.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/ezereves_hatarnal.jpg
            alt: Kép 4
            caption: Az ezeréves határnál
      - type: heading
        text: Negyedik nap
      - type: paragraph
        text: Erdélyi tartózkodásunk negyedik napján korán reggel a Súgó - barlang felé vettük az irányt. Miután megküzdöttünk a meredek hegyoldallal, a barlangban cseppkövek csodálatos látványa fogadott bennünket. A barlang mélyén lekapcsoltuk a zseblámpákat, hogy kipróbáljuk, milyen érzés teljes csendben és vaksötétben lenni.
      - type: paragraph
        text: A Súgó-barlangból egy újabb csodálatosan szép természeti jelenséghez, a Gyilkos-tóhoz indultunk. A Gyilkos-tónál finom kürtős kalácsot ettünk, hogy legyen energiánk a hosszú sétához a Békás-szorosban. Lélegzetelállítóan gyönyörű látványt nyújt a Békás-patak és az azt körülölelő hatalmas sziklafalak. Igazi természeti ritkaság, amit itt láthattunk. A függőhídon való átjutás igazi kihívás elé állította tanulóinkat.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/gyilkos-to.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/gyilkos-to.jpg
            alt: Kép 3
            caption: Gyilkos-tó
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/Békás-szoros.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/Békás-szoros.jpg
            alt: Kép 4
            caption: Békás szoros
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/esti_játék.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/esti_játék.jpg
            alt: Kép 4
            caption: Esti játék
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/bekas-szoros-csoportkep.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/bekas-szoros-csoportkep.jpg
            alt: Kép 3
            caption: Békás szoros
      - type: heading
        text: Ötödik nap
      - type: paragraph
        text: Az ötödik nap ismét az utazásról szólt. Szívünkben vegyes érzésekkel indultunk haza. Egyrészt sajnáltuk, hogy vége lett a csodás kalandoknak, másrészt örültünk, hogy este végre viszontláthatjuk a családunkat.
      - type: paragraph
        text: Fehéregyházán felkerestük a Petőfi Múzeumot, ahol egy lebilincselő előadás meghallgatása után egy koszorú elhelyezésével emlékeztünk meg Petőfi Sándorról és elénekeltük a Székely himnuszt. Segesváron sétáltunk a vár területén, majd megmásztuk a Diákok lépcsőjét és megnéztük Petőfi szobrát.
      - type: images
        images_per_row: 3
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/Fehéregyháza.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/Fehéregyháza.jpg
            alt: Kép 3
            caption: Gyilkos-tó
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/segesvar.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/segesvar.jpg
            alt: Kép 4
            caption: Békás szoros
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/Óratorony.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/Óratorony.jpg
            alt: Kép 4
            caption: Esti játék
      - type: paragraph
        text: Kirándulásunk utolsó helyszíne a nagybaromlaki erődtemplom volt. Felmentünk a templomtoronyba, ahonnan csodálatos kilátás nyílt a környező vidékre, felidézve bennünk az összes festői szépségű táj emlékét, melyeket az elmúlt napokban láthattunk.
      - type: images
        images_per_row: 1
        images:
          - full: /assets/img/ps/palyazatok/hatartalanul/hat_23/full/Nagybaromlak.jpg
            thumb: /assets/img/ps/palyazatok/hatartalanul/hat_23/thumb/Nagybaromlak.jpg
            alt: Kép 3
            caption: Nagybaromlak
      - type: paragraph
        text: Hazaérkezésünk után fotókkal színesítettük beszámolónkat, amelyet az Erdélyben szerzett élményekről tartottunk diáktársainknak.
      - type: paragraph
        text: Szerencsések vagyunk, hogy lehetőséget kaptunk erre az erdélyi útra. Rengeteg tudással gazdagodtunk. Olyan határainkon kívül eső területeken játunk, ahol magyarul beszélnek, magyarként élnek az emberek. Megismerhettük hagyományaikat, népi kultúrájukat is. Minden általunk meglátogatott helyszínről előzetesen kiselőadásokkal készültünk, melyeket hol a hosszú út közben, hol a helyszíneken adtunk elő egymásnak. Esténként vetélkedőket szerveztünk, melyek során játékos formában mérhették össze frissen megszerzett tudásunkat tanulóink. Lefekvés előtt soha nem maradt el a közös játék a szabadban, vagy a társalgóban, ahol időnként spontán bulik is kialakultak. A hosszú buszúton sem unatkoztunk soha. Rengeteget nevettünk és énekeltünk. Maradandó élmény marad ez az út mindannyiunk számára, egy szép, örök emlék, mely akkor is összeköt majd bennünket, ha már nem járunk egy iskolába.
