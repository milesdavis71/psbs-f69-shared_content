      - type: paragraph
        text: Kirándulásunk harmadik napjának reggelén a Békási-víztározó felé vettük az irányt. Az út ismét elég hosszú volt, de kárpótolt minket a lenyűgöző szépségű táj, amit láthattunk. Visszafelé a Békás-szoros egy részén gyalog tettük meg az utat. Lélegzetelállítóan gyönyörű látványt nyújt a Békás-patak és az azt körülölelő hatalmas sziklafalak. Igazi természeti ritkaság, amit itt láthattunk.
      - type: paragraph
        text: A Gyilkos-tó szintén csodálatosan szép, sokáig gyönyörködtünk is benne, mielőtt meghallgattuk kialakulásának legendáját.
