<!-- Automatikus frissítés script -->
<script>
    ;(function () {
        // hány ms-enként ellenőrizzen (itt: 10 másodperc)
        var CHECK_INTERVAL = 10000
        // a verziófájl elérési útvonala – Foundationnél így használj relatív gyökeret
        var VERSION_URL = '{{root}}version.json'

        var currentVersion = null

        function checkVersion() {
            var url = VERSION_URL + '?_=' + Date.now()
            console.log('[version-check] Lekérés:', url)

            fetch(url, { cache: 'no-store' })
                .then(function (res) {
                    console.log('[version-check] HTTP státusz:', res.status)
                    if (!res.ok) return null
                    return res.json()
                })
                .then(function (data) {
                    if (!data || typeof data.version === 'undefined') {
                        console.log(
                            '[version-check] Nincs "version" mező:',
                            data
                        )
                        return
                    }

                    var serverVersion = String(data.version)
                    console.log(
                        '[version-check] Szerver verzió:',
                        serverVersion,
                        '| Jelenlegi verzió:',
                        currentVersion
                    )

                    // első futás: csak eltároljuk az aktuális verziót
                    if (currentVersion === null) {
                        currentVersion = serverVersion
                        return
                    }

                    // ha változott a verzió, frissítjük az oldalt
                    if (serverVersion !== currentVersion) {
                        console.log('[version-check] VERZIÓ VÁLTOZOTT → RELOAD')
                        currentVersion = serverVersion // hogy ne fusson végtelen ciklusba
                        window.location.reload()
                    }
                })
                .catch(function (err) {
                    console.warn('[version-check] Hiba:', err)
                })
        }

        // azonnali első ellenőrzés, majd periodikusan
        checkVersion()
        setInterval(checkVersion, CHECK_INTERVAL)
    })()
</script>
<!-- /Automatikus frissítés script -->
